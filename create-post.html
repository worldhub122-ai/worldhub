<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Créer une publication</title>
<meta name="description" content="Partagez une publication, une image, une vidéo ou un sondage avec votre communauté WorldHub.">
<link rel="stylesheet" href="assets/css/main.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4171449506245617" crossorigin="anonymous"></script>
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/app.js"></script>
<script>
/* Issue: every function the HTML calls via onclick/onchange
   (mainCreate, handlePublish, handleImageSelect, togglePoll, ...) was
   declared *inside* `(async function(){ ... })()`. Functions declared
   inside another function are only visible in that function's own
   scope — inline HTML attribute handlers like onclick="handlePublish()"
   only ever look up the *global* (window) scope, so every single one of
   those calls threw "X is not defined" the moment it was clicked. None
   of the buttons on this page (Publier, Image, Vidéo, Sondage, Assistant
   IA) ever actually worked. Fix: declare all of these at the top level
   of the script (so they attach to `window` normally) and keep only the
   requireAuth() gate + initial data fetch + initLayout() call wrapped in
   a small async function at the very end. */
let _worlds = [];
const _preselectedWorldId = new URLSearchParams(location.search).get('world') || '';

function previewCard(){
  return `
  <div class="card">
    <div class="card-head"><h3>Aperçu</h3></div>
    <div class="post">
      <div class="post-head">
        <img class="avatar" src="${MOCK.user.avatar}" alt="" style="width:40px;height:40px">
        <div><div class="u-name">${MOCK.user.name}</div><div class="u-meta">À l’instant</div></div>
      </div>
      <div class="post-text" id="previewText" style="color:var(--text-3)">Quoi de neuf ?</div>
      <div id="previewMedia" style="margin-top:8px"></div>
      <div class="post-actions">
        <div class="a-btn">🤍 J’aime</div><div class="a-btn">💬 Commenter</div><div class="a-btn">🔄 Partager</div>
      </div>
    </div>
  </div>`;
}

function mainCreate(){
  return `
  <div class="main-col">
    <div class="card card-pad">
      <h3 style="margin:0 0 16px">Créer une publication</h3>
      <div class="field">
        <label>Contenu</label>
        <textarea id="postText" rows="5" placeholder="Quoi de neuf ?" oninput="document.getElementById('previewText').textContent=this.value||'Quoi de neuf ?'"></textarea>
      </div>
      <div class="field">
        <label>Partager dans</label>
        <select id="postWorldSelect">
          <option value="">Votre profil</option>
          ${_worlds.map(w=>`<option value="${w.id}" ${String(w.id)===String(_preselectedWorldId)?'selected':''}>${escapeHtml(w.name)}</option>`).join('')}
        </select>
      </div>
      <div id="fileErr" class="err-msg" hidden style="background:var(--red-soft);border:1px solid var(--red);color:var(--text-1);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px"></div>
      <div id="pollBuilder" hidden style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <b style="font-size:13.5px">📊 Sondage</b>
          <span class="link" style="font-size:12.5px" onclick="removePoll()">Retirer</span>
        </div>
        <div class="field" style="margin-bottom:10px"><input id="pollQuestion" placeholder="Posez une question..."></div>
        <div id="pollOptions"></div>
        <div class="link" style="font-size:12.5px" onclick="addPollOption()">+ Ajouter une option</div>
      </div>
      <input type="file" id="imageInput" accept="image/*" multiple hidden onchange="handleImageSelect(event)">
      <input type="file" id="videoInput" accept="video/mp4,video/webm,video/quicktime" hidden onchange="handleVideoSelect(event)">
      <div class="composer-actions" style="margin-bottom:16px">
        <div class="chip blue" onclick="document.getElementById('imageInput').click()">🖼️ Image</div>
        <div class="chip" onclick="document.getElementById('videoInput').click()">🎬 Vidéo</div>
        <div class="chip green" onclick="togglePoll()">📊 Sondage</div>
        <div class="chip pink" onclick="toggleAiSuggestions()">🤖 Assistant IA</div>
      </div>
      <div id="aiSuggestions" hidden style="display:flex;flex-direction:column;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px;margin-bottom:16px">
        <div style="font-size:12px;color:var(--text-3);margin-bottom:2px">Suggestions pour démarrer votre publication :</div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="location.href='index.html'">Annuler</button>
        <button class="btn btn-primary" id="btnPublish" onclick="handlePublish()">Publier</button>
      </div>
    </div>
  </div>`;
}

/* ── Image selection: validate type/size, upload each to Supabase
   Storage, show previews, and surface errors instead of failing
   silently (Issues: file validation, max size, failed-upload errors) ── */
const MAX_FILE_MB = 8;
const ALLOWED_TYPES = ['image/jpeg','image/png','image/webp','image/gif'];
let _uploadedImageUrls = [];

async function handleImageSelect(evt){
  const files = Array.from(evt.target.files || []);
  const errEl = document.getElementById('fileErr');
  errEl.hidden = true;
  const preview = document.getElementById('previewMedia');
  for (const file of files){
    if (!ALLOWED_TYPES.includes(file.type)){
      errEl.textContent = `Format non supporté: ${file.name}. Utilisez JPG, PNG, WEBP ou GIF.`;
      errEl.hidden = false;
      continue;
    }
    if (file.size > MAX_FILE_MB * 1024 * 1024){
      errEl.textContent = `"${file.name}" dépasse la taille maximale de ${MAX_FILE_MB} Mo.`;
      errEl.hidden = false;
      continue;
    }
    /* local preview immediately, real URL once upload resolves */
    const localUrl = URL.createObjectURL(file);
    const img = document.createElement('img');
    img.src = localUrl;
    img.style.cssText = 'max-width:100%;border-radius:10px;margin-top:6px;opacity:.5';
    preview.appendChild(img);
    try {
      if (typeof DB !== 'undefined' && DB.isConnected){
        const url = await DB.uploadPostMedia(file);
        _uploadedImageUrls.push(url);
        img.src = url;
        img.style.opacity = '1';
      } else {
        /* no backend connected: keep local preview only */
        _uploadedImageUrls.push(localUrl);
        img.style.opacity = '1';
      }
    } catch (err) {
      img.remove();
      errEl.textContent = `Échec de l'envoi de "${file.name}": ${err.message || 'erreur inconnue'}`;
      errEl.hidden = false;
    }
  }
}

/* ── Video selection: same validation pattern as images (Issue:
   the "Vidéo" chip existed but had no file input or upload code at all). ── */
const MAX_VIDEO_MB = 50;
const ALLOWED_VIDEO_TYPES = ['video/mp4','video/webm','video/quicktime'];
let _uploadedVideoUrl = null;

async function handleVideoSelect(evt){
  const file = evt.target.files?.[0];
  evt.target.value = '';
  if (!file) return;
  const errEl = document.getElementById('fileErr');
  errEl.hidden = true;
  if (!ALLOWED_VIDEO_TYPES.includes(file.type)){
    errEl.textContent = `Format non supporté: ${file.name}. Utilisez MP4, WEBM ou MOV.`;
    errEl.hidden = false;
    return;
  }
  if (file.size > MAX_VIDEO_MB * 1024 * 1024){
    errEl.textContent = `"${file.name}" dépasse la taille maximale de ${MAX_VIDEO_MB} Mo.`;
    errEl.hidden = false;
    return;
  }
  const preview = document.getElementById('previewMedia');
  const localUrl = URL.createObjectURL(file);
  const vid = document.createElement('video');
  vid.src = localUrl;
  vid.controls = true;
  vid.style.cssText = 'max-width:100%;border-radius:10px;margin-top:6px;opacity:.5';
  preview.appendChild(vid);
  try {
    if (typeof DB !== 'undefined' && DB.isConnected){
      const url = await DB.uploadPostMedia(file);
      _uploadedVideoUrl = url;
      vid.src = url;
    } else {
      _uploadedVideoUrl = localUrl;
    }
    vid.style.opacity = '1';
  } catch (err) {
    vid.remove();
    errEl.textContent = `Échec de l'envoi de "${file.name}": ${err.message || 'erreur inconnue'}`;
    errEl.hidden = false;
  }
}

/* ── Poll builder (Issue: "Sondage" chip existed but did nothing).
   There is no dedicated polls table in the schema yet, so the poll is
   composed into the post's text content as a clearly-marked block —
   this keeps it real and working today without inventing a fake backend. ── */
let _pollOptionCount = 0;
function togglePoll(){
  const el = document.getElementById('pollBuilder');
  el.hidden = !el.hidden;
  if (!el.hidden && !document.getElementById('pollOptions').children.length){
    addPollOption(); addPollOption();
  }
}
function removePoll(){
  document.getElementById('pollBuilder').hidden = true;
  document.getElementById('pollOptions').innerHTML = '';
  _pollOptionCount = 0;
}
function addPollOption(){
  if (document.getElementById('pollOptions').children.length >= 5) return;
  _pollOptionCount++;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
  row.innerHTML = `<input placeholder="Option ${_pollOptionCount}" style="flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-1);font-size:13.5px">
    <button type="button" class="icon-btn" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('pollOptions').appendChild(row);
}
function buildPollText(){
  const el = document.getElementById('pollBuilder');
  if (el.hidden) return '';
  const question = document.getElementById('pollQuestion').value.trim();
  const options = Array.from(document.querySelectorAll('#pollOptions input')).map(i=>i.value.trim()).filter(Boolean);
  if (!question || options.length < 2) return '';
  return `\n\n📊 Sondage : ${question}\n${options.map(o=>'• '+o).join('\n')}`;
}

/* ── "Assistant IA" — offers a handful of canned writing prompts to
   insert into the composer. This is intentionally a suggestions list,
   not a real generative call, so the label doesn't overpromise. ── */
const AI_SUGGESTIONS = [
  'Partagez une astuce technique que vous avez apprise récemment 💡',
  'Annoncez un projet sur lequel vous travaillez en ce moment 🚀',
  'Posez une question ouverte à la communauté ❓',
  'Racontez une leçon apprise après une erreur ou un échec 🔁',
];
function toggleAiSuggestions(){
  const el = document.getElementById('aiSuggestions');
  el.hidden = !el.hidden;
  if (!el.hidden && el.children.length <= 1){
    AI_SUGGESTIONS.forEach(s=>{
      const item = document.createElement('div');
      item.className = 'link';
      item.style.cssText = 'font-size:13px;cursor:pointer;padding:4px 0';
      item.textContent = '→ ' + s;
      item.onclick = () => {
        const ta = document.getElementById('postText');
        ta.value = s;
        ta.dispatchEvent(new Event('input'));
        el.hidden = true;
        ta.focus();
      };
      el.appendChild(item);
    });
  }
}

async function handlePublish(){
  const pollText = buildPollText();
  const text = document.getElementById('postText').value.trim() + pollText;
  if (!text.trim() && _uploadedImageUrls.length === 0 && !_uploadedVideoUrl){
    const errEl = document.getElementById('fileErr');
    errEl.textContent = 'Ajoutez du texte, une image ou une vidéo avant de publier.';
    errEl.hidden = false;
    return;
  }
  const btn = document.getElementById('btnPublish');
  btn.disabled = true;
  btn.textContent = 'Publication...';
  try {
    const worldId = document.getElementById('postWorldSelect').value || null;
    await api.createPost(text, worldId, _uploadedImageUrls[0] || null, _uploadedVideoUrl || null);
    location.href = worldId ? ('world.html?id=' + encodeURIComponent(worldId)) : 'index.html';
  } catch (err) {
    const errEl = document.getElementById('fileErr');
    errEl.textContent = err.message || 'Impossible de publier. Réessayez.';
    errEl.hidden = false;
    btn.disabled = false;
    btn.textContent = 'Publier';
  }
}

(async function init(){
  const _session = await requireAuth();
  if (!_session) return;
  try { _worlds = await api.getWorlds(); } catch (err) { _worlds = MOCK.worlds; }
  initLayout({ active:'create', mainHTML: mainCreate(), rail: previewCard() });
})();
</script>
</body>
</html>
