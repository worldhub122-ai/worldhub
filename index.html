<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Accueil</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/app.js"></script>
<script>
function postCard(p){
  const pid = p.actionId || p.id;
  return `
  <div class="post">
    ${repostBannerHTML(p)}
    <div class="post-head">
      <img class="avatar" src="${p.avatarUrl || ('https://i.pravatar.cc/80?u=' + encodeURIComponent(p.handle))}" style="width:40px;height:40px">
      <div>
        <div class="u-name">${escapeHtml(p.author)} <span class="badge-world">${escapeHtml(p.world)}</span></div>
        <div class="u-meta">${escapeHtml(p.handle)} · ${escapeHtml(p.time)}</div>
      </div>
      ${moreMenuHTML(p)}
    </div>
    <div class="post-text">${renderPostText(p.text)}</div>
    ${p.code ? `<div class="code-card">${p.code}</div>` : ''}
    ${p.highlight ? `<div class="highlight-card">JS</div>` : ''}
    ${p.imageUrl ? `<img src="${p.imageUrl}" style="max-width:100%;border-radius:10px;margin-top:8px;display:block">` : ''}
    ${p.videoUrl ? `<video src="${p.videoUrl}" controls style="max-width:100%;border-radius:10px;margin-top:8px;display:block"></video>` : ''}
    ${quotedPostHTML(p)}
    ${pollPlaceholderHTML(p)}
    <div class="post-stats"><span>❤️ ${p.likes} j’aime</span><span class="comments-count">${p.comments} commentaires · ${p.shares} partages</span></div>
    <div class="post-actions">
      <div class="a-btn" data-like data-post-id="${pid}"><span>🤍</span> J’aime <span class="count">${p.likes}</span></div>
      <div class="a-btn" onclick="toggleCommentBox('${pid}')">💬 Commenter</div>
      ${repostButtonHTML(p)}
      <div class="a-btn" onclick="handleShare('${pid}')">🔗 Partager</div>
    </div>
    <div class="comment-box" id="cbox-${pid}" hidden style="display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border-soft)">
      <img class="avatar" src="${MOCK.user.avatar}" style="width:28px;height:28px;flex:none">
      <input type="text" placeholder="Écrire un commentaire... (@mention #tag)" id="cinput-${pid}" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:8px 14px;color:var(--text-1);font-size:13.5px" onkeydown="if(event.key==='Enter') submitComment('${pid}')">
      <button class="btn btn-primary btn-sm" onclick="submitComment('${pid}')">Envoyer</button>
    </div>
    ${renderCommentPreview(p)}
  </div>`;
}

/* Reveal/hide the inline reply box under a post, then focus it
   (Issue: "Commenter" only ever redirected to create-post.html,
   there was no way to actually leave a reply on a post). */
function toggleCommentBox(postId){
  const box = document.getElementById('cbox-' + postId);
  if (!box) return;
  box.hidden = !box.hidden;
  if (!box.hidden) document.getElementById('cinput-' + postId)?.focus();
}

async function submitComment(postId){
  const input = document.getElementById('cinput-' + postId);
  const text = input?.value.trim();
  if (!text) return;
  if (typeof DB !== 'undefined' && DB.isConnected) {
    const session = await DB.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  }
  input.disabled = true;
  try {
    const comment = await api.addComment(postId, text);
    input.value = '';
    /* Append the new comment to the preview list right away instead of
       waiting for a full page reload. */
    const post = document.querySelector(`[data-post-id="${postId}"]`)?.closest('.post');
    let previewEl = post?.querySelector('.comment-preview');
    const rowHTML = `
      <div style="display:flex;gap:8px;margin-bottom:8px;font-size:13px">
        <img class="avatar" src="${MOCK.user.avatar}" style="width:26px;height:26px;flex:none">
        <div><b>${escapeHtml(MOCK.user.name)}</b>
        <span style="color:var(--text-2)">${renderPostText(text)}</span></div>
      </div>`;
    if (previewEl) {
      previewEl.insertAdjacentHTML('afterbegin', rowHTML);
    } else if (post) {
      const box = post.querySelector('.comment-box');
      box.insertAdjacentHTML('afterend', `<div class="comment-preview" style="padding:10px 16px 4px;border-top:1px solid var(--border-soft)">${rowHTML}</div>`);
    }
    const countEl = post?.querySelector('.comments-count');
    if (countEl) {
      const n = (parseInt(countEl.textContent.replace(/\D/g, '')) || 0) + 1;
      const parts = countEl.textContent.split('·');
      countEl.textContent = `${n} commentaires · ${(parts[1] || '').trim()}`;
    }
  } catch (err) {
    showError(err);
  } finally {
    input.disabled = false;
  }
}

/* Share = copy a link to this post to the clipboard (Issue: the share
   button had no click handler and did nothing at all). */
async function handleShare(postId){
  const url = `${location.origin}${location.pathname}?post=${encodeURIComponent(postId)}`;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Lien copié dans le presse-papiers ✓', 'success');
  } catch (err) {
    showToast(url, 'info');
  }
}

/* Show up to 2 real comments under a post (Issue: comments never rendered before) */
function renderCommentPreview(p){
  if(!p.commentList || !p.commentList.length) return '';
  return `
  <div class="comment-preview" style="padding:10px 16px 4px;border-top:1px solid var(--border-soft)">
    ${p.commentList.slice(0,2).map(c=>`
      <div style="display:flex;gap:8px;margin-bottom:8px;font-size:13px">
        <img class="avatar" src="${c.author?.avatar_url || 'https://i.pravatar.cc/60?u='+(c.author?.id||'x')}" style="width:26px;height:26px;flex:none">
        <div><b>${escapeHtml(c.author ? (c.author.first_name+' '+(c.author.last_name||'')).trim() : 'Utilisateur')}</b>
        <span style="color:var(--text-2)">${renderPostText(c.content)}</span></div>
      </div>`).join('')}
    ${p.comments > 2 ? `<div class="link" style="font-size:12.5px;cursor:pointer" onclick="location.href='create-post.html'">Voir les ${p.comments} commentaires</div>` : ''}
  </div>`;
}

function composer(){
  return `
  <div class="card composer">
    <div class="composer-top">
      <img class="avatar" src="${MOCK.user.avatar}" style="width:42px;height:42px">
      <div class="fake-input" onclick="location.href='create-post.html'">Quoi de neuf dans votre monde ?</div>
    </div>
    <div class="composer-actions">
      <div class="chip blue" onclick="location.href='create-post.html'">🖼️ Image</div>
      <div class="chip pink" onclick="location.href='create-post.html'">🎬 Vidéo</div>
      <div class="chip" onclick="location.href='create-post.html'">🌍 Monde</div>
      <div class="chip green" onclick="location.href='create-post.html'">📊 Sondage</div>
      <div class="spacer"></div>
      <button class="btn btn-primary btn-sm" onclick="location.href='create-post.html'">Publier</button>
    </div>
  </div>`;
}

async function render(){
  // Issue 3/5: hydrate user data for composer avatar
  const profile = await api.getCurrentProfile();
  MOCK.user.name   = profile.name;
  MOCK.user.avatar = profile.avatar;
  MOCK.user.handle = profile.handle;

  const posts = await api.getFeed();
  _feedUserId = profile.id || null;
  _feedPostsById = {};
  posts.forEach(p => { _feedPostsById[p.actionId || p.id] = p; });
  const mainHTML = `
    <div class="main-col">
      ${composer()}
      <div class="card">
        <div class="tabs">
          <div class="tab active">Pour vous</div>
          <div class="tab">Abonnements</div>
          <div class="tab">Mondes</div>
          <div class="tab">Plus récent ▾</div>
        </div>
        ${posts.map(postCard).join('')}
      </div>
    </div>`;
  initLayout({ active:'home', mainHTML });
  hydratePollsIn(posts);
}
render();
</script>
</body>
</html>
