<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — ترتيب الأعضاء</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="sidebar.css">
<style>
  .rank-row{ display:flex; align-items:center; gap:14px; padding:14px 20px; border-bottom:1px solid var(--border-soft); }
  .rank-row:last-child{ border-bottom:none; }
  .rank-num{ width:28px; text-align:center; font-family:var(--font-display); font-weight:900; font-size:16px; color:var(--text-faint); }
  .rank-num.top1{ color:var(--gold); } .rank-num.top2{ color:#c0c0c0; } .rank-num.top3{ color:#cd7f32; }
  .rank-name{ font-weight:800; font-size:14.5px; }
  .rank-handle{ font-size:12px; color:var(--text-faint); }
  .rank-pts{ margin-inline-start:auto; font-family:var(--font-display); font-weight:800; color:var(--gold); }
</style>
</head>
<body data-page="more">

<header class="topbar">
  <a href="index.html" class="brand"><div class="brand__mark">🌍</div><div class="brand__name">World<span>Hub</span></div></a>
  <div class="topbar__search"><span id="ic-search"></span><input type="text" placeholder="ابحث..."><span class="kbd">⌘K</span></div>
  <div class="topbar__actions">
    <a href="notifications.html" class="icon-btn"><span class="badge">8</span><span id="ic-bell"></span></a>
    <a href="messages.html" class="icon-btn"><span class="badge">3</span><span id="ic-msg"></span></a>
    <a href="profile.html"><img class="avatar" width="40" height="40" src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?q=80&w=200&auto=format&fit=crop"></a>
  </div>
</header>

<div class="layout layout--narrow">
  <aside class="col-right col-sticky">
    <nav class="nav">
      <a href="index.html" class="nav__link" data-page="home">${nav-home}<span>الرئيسية</span></a>
      <a href="reels.html" class="nav__link" data-page="reels">${nav-reels}<span>الريلز</span></a>
      <a href="messages.html" class="nav__link" data-page="messages">${nav-messages}<span>الرسائل</span></a>
      <a href="notifications.html" class="nav__link" data-page="notifications">${nav-bell}<span>الإشعارات</span></a>
      <a href="worlds.html" class="nav__link" data-page="worlds">${nav-globe}<span>العوالم</span></a>
      <a href="dashboard.html" class="nav__link" data-page="dashboard">${nav-dashboard}<span>لوحة المعلومات</span></a>
      <a href="profile.html" class="nav__link" data-page="profile">${nav-user}<span>الملف الشخصي</span></a>
    </nav>
  </aside>

  <main class="col-center" style="max-width:700px;">
    <div class="section-heading">ترتيب الأعضاء 🏆</div>
    <div class="section-sub mb-16">الأعضاء الأكثر نشاطاً وتفاعلاً في WorldHub</div>
    <div class="card" id="rankList"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="auth-guard.js"></script>
<script src="app.js"></script>
<script>
  const iconMap = {'ic-search':'search','ic-bell':'bell','ic-msg':'messages','nav-home':'home','nav-reels':'reels','nav-messages':'messages','nav-bell':'bell','nav-globe':'globe','nav-dashboard':'dashboard','nav-user':'user'};
  document.body.innerHTML = document.body.innerHTML.replace(/\$\{([a-z0-9\-]+)\}/g, (_, key) => WH.ICONS[iconMap[key]] || '');

  const ranked = [...WH.PEOPLE].filter(p=>p.id!=='you').sort((a,b)=>b.points-a.points);
  document.getElementById('rankList').innerHTML = ranked.map((p,i)=>{
    const cls = i===0?'top1':i===1?'top2':i===2?'top3':'';
    return `<div class="rank-row">
      <div class="rank-num ${cls}">${i+1}</div>
      ${WH.avatarHTML(p,42)}
      <div>
        <div class="rank-name">${p.name}</div>
        <div class="rank-handle">${p.handle}</div>
      </div>
      <div class="rank-pts">${WH.fmt(p.points)} نقطة</div>
    </div>`;
  }).join('');
</script>
</body>
</html>
