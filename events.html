<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Événements</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="assets/js/app.js"></script>
<script>
function eventCard(e){
  return `
  <div class="card card-pad" style="display:flex;gap:16px;align-items:flex-start">
    <div class="tile" style="background:var(--accent-soft);color:var(--accent-2);flex-direction:column;font-weight:800;width:52px;height:52px;line-height:1.1">
      ${e.day}<span style="font-size:10px;font-weight:700">${e.mon}</span>
    </div>
    <div style="flex:1">
      <div style="font-weight:700;font-size:15.5px">${e.title}</div>
      <div style="color:var(--text-3);font-size:13px;margin:3px 0 8px">📍 ${e.place} · ${e.going}</div>
      <p style="font-size:13.5px;color:var(--text-2);margin:0 0 10px">${e.desc}</p>
      <button class="btn btn-primary btn-sm">Participer</button>
    </div>
  </div>`;
}
function eventsRail(){
  return `
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">Catégories</h3>
    ${['Tous les événements',...MOCK.worlds.map(w=>w.name)].map((c,i)=>`
      <div class="row" style="padding:8px 0;justify-content:space-between">
        <span style="font-size:13.5px;${i===0?'font-weight:700;color:var(--text-1)':'color:var(--text-2)'}">${c}</span>
      </div>`).join('')}
  </div>
  <div class="card card-pad" style="text-align:center">
    <div style="font-size:28px;margin-bottom:6px">📅</div>
    <div style="font-weight:700;margin-bottom:4px">Organisez le vôtre</div>
    <p style="font-size:12.5px;color:var(--text-3);margin:0 0 12px">Créez un événement et invitez votre communauté.</p>
    <button class="btn btn-primary" style="width:100%">Créer un événement</button>
  </div>`;
}
function mainEvents(){
  return `
  <div class="main-col">
    <div class="card card-pad" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div>
        <div class="tabs" style="border:none;padding:0">
          <div class="tab active">À venir</div>
          <div class="tab">Passés</div>
        </div>
      </div>
      <button class="btn btn-primary">+ Créer un événement</button>
    </div>
    ${MOCK.events.map(eventCard).join('')}
  </div>`;
}
initLayout({ active:'events', mainHTML: mainEvents(), rail: eventsRail() });
</script>
</body>
</html>
