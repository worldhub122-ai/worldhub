<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Événements</title>
<meta name="description" content="Découvrez et créez des événements dans vos Mondes préférés sur WorldHub.">
<link rel="stylesheet" href="assets/css/main.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4171449506245617" crossorigin="anonymous"></script>
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/app.js"></script>
<script>
/* ?world=<id> — venir depuis l'onglet "Événements du monde" d'une page
   monde (world.html). Filtre la liste et pré-remplit le formulaire de
   création (Issue: aucun lien entre les événements et un monde donné
   n'existait dans l'interface, même si events.world_id existe en base). */
const FILTER_WORLD_ID = new URLSearchParams(location.search).get('world') || null;
let _filterWorldName = '';
let _worlds = [];

function eventCard(e){
  return `
  <div class="card card-pad" style="display:flex;gap:16px;align-items:flex-start">
    <div class="tile" style="background:var(--accent-soft);color:var(--accent-2);flex-direction:column;font-weight:800;width:52px;height:52px;line-height:1.1">
      ${escapeHtml(e.day)}<span style="font-size:10px;font-weight:700">${escapeHtml(e.mon)}</span>
    </div>
    <div style="flex:1">
      <div style="font-weight:700;font-size:15.5px">${escapeHtml(e.title)}</div>
      <div style="color:var(--text-3);font-size:13px;margin:3px 0 8px">📍 ${escapeHtml(e.place)} · ${escapeHtml(e.going)}</div>
      <p style="font-size:13.5px;color:var(--text-2);margin:0 0 10px">${escapeHtml(e.desc)}</p>
      <button class="btn btn-primary btn-sm" data-event-id="${e.id ?? ''}" onclick="handleRsvp(this)">Participer</button>
    </div>
  </div>`;
}
/* Issue: the category rows here ("Tous les événements", "Programmation",
   "IA & ML", ...) had no onclick at all — clicking them did literally
   nothing — and the list came from static MOCK.worlds instead of the
   real worlds (so any world you actually created never showed up as a
   category). Now: takes the real worlds list, each row navigates to
   events.html?world=<id> (mirrors the same URL-driven filter the page
   already reads via FILTER_WORLD_ID on load), "Tous les événements"
   clears the filter, and the active category is highlighted based on
   the current filter instead of always bolding the first item. */
function eventsRail(worlds){
  const categories = [{ id: null, name: 'Tous les événements' }, ...worlds];
  return `
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">Catégories</h3>
    ${categories.map(c=>{
      const isActive = c.id ? String(c.id) === String(FILTER_WORLD_ID) : !FILTER_WORLD_ID;
      const href = c.id ? ('events.html?world=' + encodeURIComponent(c.id)) : 'events.html';
      return `
      <div class="row" style="padding:8px 0;justify-content:space-between;cursor:pointer" onclick="location.href='${href}'">
        <span style="font-size:13.5px;${isActive?'font-weight:700;color:var(--text-1)':'color:var(--text-2)'}">${escapeHtml(c.name)}</span>
      </div>`;
    }).join('')}
  </div>
  <div class="card card-pad" style="text-align:center">
    <div style="font-size:28px;margin-bottom:6px">📅</div>
    <div style="font-weight:700;margin-bottom:4px">Organisez le vôtre</div>
    <p style="font-size:12.5px;color:var(--text-3);margin:0 0 12px">Créez un événement et invitez votre communauté.</p>
    <button class="btn btn-primary" style="width:100%" onclick="openCreateEventModal()">Créer un événement</button>
  </div>`;
}

/* RSVP "going" to an event: requires login, gives clear feedback. */
async function handleRsvp(btn){
  const eventId = btn.dataset.eventId;
  if (typeof DB !== 'undefined' && DB.isConnected) {
    const session = await DB.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  }
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await api.rsvpEvent(eventId);
    btn.textContent = 'Je participe ✓';
  } catch (err) {
    showError(err);
    btn.disabled = false;
    btn.textContent = 'Participer';
  }
}

function mainEvents(events){
  return `
  <div class="main-col">
    ${FILTER_WORLD_ID ? `
    <div class="card card-pad" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <span>📅 Événements du monde <b>${escapeHtml(_filterWorldName || FILTER_WORLD_ID)}</b></span>
      <span class="link" onclick="location.href='world.html?id=${encodeURIComponent(FILTER_WORLD_ID)}'">← Retour au monde</span>
    </div>` : ''}
    <div class="card card-pad" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div>
        <div class="tabs" style="border:none;padding:0">
          <div class="tab active">À venir</div>
          <div class="tab">Passés</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="openCreateEventModal()">+ Créer un événement</button>
    </div>
    ${events.length ? events.map(eventCard).join('') : `<div class="card card-pad" style="text-align:center;color:var(--text-3)">Aucun événement à venir${FILTER_WORLD_ID ? ' dans ce monde' : ''}.</div>`}
  </div>`;
}

/* Create-event modal (Issue: both "Créer un événement" buttons had no
   onclick handler, even though DB.createEvent already existed). */
function openCreateEventModal(){
  openModal(`
    <h3 style="margin:0 0 16px">Créer un événement</h3>
    <div class="field"><label>Titre</label><input id="ceTitle" placeholder="Nom de l'événement"></div>
    <div class="field"><label>Description</label><textarea id="ceDesc" rows="3" placeholder="Décrivez votre événement"></textarea></div>
    <div class="field"><label>Date et heure de début</label><input id="ceStart" type="datetime-local"></div>
    <div class="field"><label>Lieu</label><input id="ceLocation" placeholder="ex: Paris, France"></div>
    <div class="field"><label>Monde</label><select id="ceWorld"><option value="">Aucun</option>${_worlds.map(w=>`<option value="${w.id}" ${FILTER_WORLD_ID===w.id?'selected':''}>${escapeHtml(w.name)}</option>`).join('')}</select></div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--text-2);margin-bottom:14px"><input type="checkbox" id="ceOnline"> Événement en ligne</label>
    <div id="ceErr" class="err-msg" hidden style="background:var(--red-soft);border:1px solid var(--red);color:var(--text-1);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="ceSubmit" onclick="submitCreateEvent()">Créer</button>
    </div>`);
}
async function submitCreateEvent(){
  const title = document.getElementById('ceTitle').value.trim();
  const description = document.getElementById('ceDesc').value.trim();
  const startVal = document.getElementById('ceStart').value;
  const location = document.getElementById('ceLocation').value.trim();
  const worldId = document.getElementById('ceWorld').value || null;
  const isOnline = document.getElementById('ceOnline').checked;
  const errEl = document.getElementById('ceErr');
  if (!title || !startVal){ errEl.textContent = 'Le titre et la date de début sont requis.'; errEl.hidden = false; return; }
  if (typeof DB !== 'undefined' && DB.isConnected){
    const session = await DB.getSession();
    if (!session){ window.location.href = 'login.html'; return; }
  }
  const btn = document.getElementById('ceSubmit');
  btn.disabled = true; btn.textContent = 'Création...';
  try{
    await api.createEvent({ title, description, location, isOnline, startsAt: new Date(startVal).toISOString(), endsAt: null, worldId });
    closeModal();
    showToast('Événement créé ✓', 'success');
    render();
  }catch(err){
    errEl.textContent = err.message || 'Impossible de créer cet événement.';
    errEl.hidden = false;
    btn.disabled = false; btn.textContent = 'Créer';
  }
}

async function render(){
  if (FILTER_WORLD_ID) {
    try { const w = await api.getWorld(FILTER_WORLD_ID); _filterWorldName = w?.name || ''; } catch {}
  }
  try { _worlds = await api.getWorlds(); } catch (err) { _worlds = MOCK.worlds; }
  const events = await api.getEvents(FILTER_WORLD_ID);
  initLayout({ active: FILTER_WORLD_ID || 'events', mainHTML: mainEvents(events), rail: eventsRail(_worlds) });
}
render();
</script>
</body>
</html>
