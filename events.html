<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — الأحداث القادمة</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="sidebar.css">
<style>
  .events-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  @media (max-width:700px){ .events-grid{ grid-template-columns:1fr; } }
  .event-card{ display:flex; gap:14px; padding:18px; }
  .event-card__date{ flex-shrink:0; width:58px; height:58px; border-radius:14px; background:var(--bg-elevated); border:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11.5px; font-weight:800; color:var(--accent-2); }
  .event-card__date b{ font-size:19px; color:var(--text); }
  .event-card__title{ font-weight:800; font-size:15px; margin-bottom:4px; }
  .event-card__meta{ font-size:12.5px; color:var(--text-faint); }
</style>
</head>
<body data-page="more">

<header class="topbar">
  <a href="index.html" class="brand"><div class="brand__mark">🌍</div><div class="brand__name">World<span>Hub</span></div></a>
  <div class="topbar__search"><span id="ic-search"></span><input type="text" placeholder="ابحث..."><span class="kbd">⌘K</span></div>
  <div class="topbar__actions">
    <a href="notifications.html" class="icon-btn"><span class="badge">8</span><span id="ic-bell"></span></a>
    <a href="messages.html" class="icon-btn"><span class="badge">3</span><span id="ic-msg"></span></a>
    <a href="profile.html"><img class="avatar" width="40" height="40" src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?q=80&w=200&auto=format&fit=crop"></a>
  </div>
</header>

<div class="layout layout--narrow">
  <aside class="col-right col-sticky">
    <nav class="nav">
      <a href="index.html" class="nav__link" data-page="home">${nav-home}<span>الرئيسية</span></a>
      <a href="reels.html" class="nav__link" data-page="reels">${nav-reels}<span>الريلز</span></a>
      <a href="messages.html" class="nav__link" data-page="messages">${nav-messages}<span>الرسائل</span></a>
      <a href="notifications.html" class="nav__link" data-page="notifications">${nav-bell}<span>الإشعارات</span></a>
      <a href="worlds.html" class="nav__link" data-page="worlds">${nav-globe}<span>العوالم</span></a>
      <a href="dashboard.html" class="nav__link" data-page="dashboard">${nav-dashboard}<span>لوحة المعلومات</span></a>
      <a href="profile.html" class="nav__link" data-page="profile">${nav-user}<span>الملف الشخصي</span></a>
    </nav>
  </aside>

  <main class="col-center" style="max-width:800px;">
    <div class="section-heading">الأحداث القادمة 📅</div>
    <div class="section-sub mb-16">فعاليات ومؤتمرات قادمة في عوالمك المفضّلة</div>
    <div class="events-grid" id="eventsGrid"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="auth-guard.js"></script>
<script src="app.js"></script>
<script>
  const iconMap = {'ic-search':'search','ic-bell':'bell','ic-msg':'messages','nav-home':'home','nav-reels':'reels','nav-messages':'messages','nav-bell':'bell','nav-globe':'globe','nav-dashboard':'dashboard','nav-user':'user'};
  document.body.innerHTML = document.body.innerHTML.replace(/\$\{([a-z0-9\-]+)\}/g, (_, key) => WH.ICONS[iconMap[key]] || '');

  document.getElementById('eventsGrid').innerHTML = WH.EVENTS.map(e=>`
    <div class="card event-card">
      <div class="event-card__date">${e.date.m}<b>${e.date.d}</b></div>
      <div>
        <div class="event-card__title">${e.title}</div>
        <div class="event-card__meta">📍 ${e.place}</div>
        <div class="event-card__meta">👥 ${e.people}</div>
      </div>
    </div>`).join('');
</script>
</body>
</html>
