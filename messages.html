<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Messages</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/app.js"></script>
<script>
let CURRENT_USER_ID = null;

function chatList(conversations, activeIndex){
  if(!conversations.length){
    return `<div style="padding:24px 18px;text-align:center;color:var(--text-3);font-size:13px">Aucune conversation pour l’instant.</div>`;
  }
  return conversations.map((c,i)=>`
    <div class="chat-item ${i===activeIndex?'active':''}">
      <div style="position:relative;flex:none">
        <img class="avatar" src="${c.avatar}" style="width:42px;height:42px">
        ${c.online?'<span class="online-dot" style="position:absolute;bottom:0;right:0"></span>':''}
      </div>
      <div style="flex:1;min-width:0">
        <div class="name-row"><span>${c.name}</span><span style="color:var(--text-3);font-weight:400">${c.time}</span></div>
        <div class="preview">${c.preview}</div>
      </div>
      ${c.unread ? `<span class="nav-badge" style="background:var(--accent);color:#fff">${c.unread}</span>`:''}
    </div>`).join('');
}

function chatBubbles(thread){
  if(!thread.length){
    return `<div class="empty-thread" style="margin:auto;color:var(--text-3);font-size:13px">Aucun message. Dites bonjour 👋</div>`;
  }
  return thread.map(m=>`
    <div style="display:flex;flex-direction:column;align-items:${m.from==='me'?'flex-end':'flex-start'}">
      <div class="bubble ${m.from==='me'?'out':'in'}">${m.text}</div>
      <span class="bubble-time">${m.time}</span>
    </div>`).join('');
}

// Loads the message thread with a given user. Falls back to the demo
// thread when Supabase isn't configured, so the page still previews.
async function loadThread(otherUserId){
  if(!DB.isConnected || !otherUserId) return MOCK.chatThread.slice();
  try{
    const rows = await DB.listMessages(otherUserId);
    DB.markMessagesRead(otherUserId).catch(()=>{});
    return rows.map(r => ({
      from: r.sender_id === CURRENT_USER_ID ? 'me' : 'them',
      text: r.content,
      time: timeAgo(r.created_at),
    }));
  }catch(e){
    console.error('loadThread failed:', e);
    return [];
  }
}

function buildMainMessages(conversations, activeIndex, active, thread){
  return `
  <div class="main-col" style="max-width:none">
    <div class="chat-shell">
      <div class="chat-list">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border-soft)">
          <div class="search-box" style="max-width:none"><span>🔍</span><input placeholder="Rechercher des messages..."></div>
        </div>
        ${chatList(conversations, activeIndex)}
      </div>
      <div class="chat-main">
        <div class="chat-head">
          <div style="position:relative"><img class="avatar" src="${active?.avatar||''}" style="width:38px;height:38px">${active?.online?'<span class="online-dot" style="position:absolute;bottom:0;right:0"></span>':''}</div>
          <div><div style="font-weight:700;font-size:14.5px">${active?.name || 'Aucune conversation'}</div><div style="font-size:12px;color:var(--green)">${active?.online?'En ligne':'&nbsp;'}</div></div>
          <div style="margin-left:auto;display:flex;gap:8px">
            <span class="icon-btn">📞</span><span class="icon-btn">🎥</span><span class="icon-btn">ℹ️</span>
          </div>
        </div>
        <div class="chat-body" id="chatBody">${chatBubbles(thread)}</div>
        <div class="chat-input-bar">
          <span class="icon-btn">📎</span>
          <input id="chatInput" placeholder="Écrivez votre message..." ${active?'':'disabled'}>
          <button id="sendBtn" class="btn btn-primary btn-sm" ${active?'':'disabled'}>Envoyer</button>
        </div>
      </div>
      <div class="chat-info">
        <div style="text-align:center">
          <img class="avatar" src="${active?.avatar||''}" style="width:76px;height:76px;margin:0 auto 10px">
          <div style="font-weight:700">${active?.name || ''}</div>
          <div style="font-size:12px;color:var(--green)">${active?.online?'En ligne':''}</div>
        </div>
        <div class="nav-label" style="padding-left:0">Options</div>
        <div class="row" style="padding:10px 0">👤 Voir le profil</div>
        <div class="row" style="padding:10px 0">📁 Fichiers partagés</div>
        <div class="row" style="padding:10px 0">🔍 Rechercher dans la conversation</div>
        <div class="row" style="padding:10px 0">🔕 Notifications</div>
      </div>
    </div>
  </div>`;
}

function wireSend(active){
  const btn = document.getElementById('sendBtn');
  const input = document.getElementById('chatInput');
  const body = document.getElementById('chatBody');
  if(!btn || !active) return;
  async function send(){
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    body.querySelector('.empty-thread')?.remove();
    body.insertAdjacentHTML('beforeend', `
      <div style="display:flex;flex-direction:column;align-items:flex-end">
        <div class="bubble out">${text}</div>
        <span class="bubble-time">${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
      </div>`);
    body.scrollTop = body.scrollHeight;
    try{ await api.sendMessage(active.id, text); }
    catch(e){ console.error('sendMessage failed:', e); }
  }
  btn.addEventListener('click', send);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });
}

async function render(){
  if(typeof DB !== 'undefined' && DB.isConnected){
    try{ CURRENT_USER_ID = (await DB.getCurrentUser())?.id || null; }
    catch(e){ console.warn('getCurrentUser failed:', e); }
  }
  const conversations = await api.getConversations();
  const activeIndex = 0;
  const active = conversations[activeIndex] || null;
  const thread = active ? await loadThread(active.id) : [];
  const mainHTML = buildMainMessages(conversations, activeIndex, active, thread);
  await initLayout({ active:'messages', mainHTML, noRail:true, wide:true });
  wireSend(active);
}
render();
</script>
</body>
</html>
