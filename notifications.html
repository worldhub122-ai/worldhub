<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Notifications</title>
<link rel="stylesheet" href="assets/css/main.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4171449506245617" crossorigin="anonymous"></script>
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/app.js"></script>
<script>
(async function() {
  const _session = await requireAuth();
  if (!_session) return;

function notifRow(n){
  return `
  <div class="notif-row ${n.unread?'unread':''}" data-notif-id="${n.id ?? ''}" onclick="handleNotifClick('${n.id ?? ''}')" style="cursor:pointer">
    <div class="notif-ic" style="background:${COLOR_VARS[n.color]}">${n.icon}</div>
    <div style="flex:1">
      <div style="font-size:14px">${n.text}</div>
      <div style="font-size:12px;color:var(--text-3);margin-top:3px">${escapeHtml(n.time)}</div>
    </div>
    ${n.unread ? `<span style="width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px"></span>` : ''}
  </div>`;
}

/* Mark a single notification read on click (Issue 9) */
async function handleNotifClick(id){
  if (!id) return;
  const row = document.querySelector(`[data-notif-id="${id}"]`);
  if (row) { row.classList.remove('unread'); row.querySelector('span[style*="border-radius:50%"]')?.remove(); }
  try { await api.markNotificationRead(id); } catch (err) { console.warn(err); }
}

async function handleMarkAllRead(){
  document.querySelectorAll('.notif-row.unread').forEach(row=>{
    row.classList.remove('unread');
    row.querySelector('span[style*="border-radius:50%"]')?.remove();
  });
  try { await api.markAllNotificationsRead(); } catch (err) { console.warn(err); }
}

/* ── Notification category filters (Issue: these were plain static
   rows with no onclick at all — clicking "Mentions", "J'aime", etc.
   did absolutely nothing). Now they actually filter the already-loaded
   list client-side, using the notification `type` field returned by
   api.getNotifications(). ── */
const NOTIF_FILTERS = [
  { key:'all',     label:'Toutes'       },
  { key:'mention', label:'Mentions'     },
  { key:'comment', label:'Commentaires' },
  { key:'like',    label:'J’aime'       },
  { key:'repost',  label:'Republications' },
  { key:'follow',  label:'Abonnés'      },
  { key:'world_invite', label:'Invitations aux mondes' },
  { key:'system',  label:'Système'      },
];
let _allNotifications = [];
let _activeNotifFilter = 'all';

function filterRail(){
  return `
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">Filtres</h3>
    ${NOTIF_FILTERS.map(f=>`
      <div class="row" style="padding:9px 0;justify-content:space-between;cursor:pointer" onclick="setNotifFilter('${f.key}')">
        <span style="font-size:13.5px;${f.key===_activeNotifFilter?'font-weight:700;color:var(--text-1)':'color:var(--text-2)'}">${f.label}</span>
        ${f.key===_activeNotifFilter?'<span class="pill pill-accent">●</span>':''}
      </div>`).join('')}
  </div>`;
}

/* Les Reels ont leurs propres types ('reel_like'/'reel_comment') pour un
   texte/icône dédiés, mais côté filtres ils comptent comme "J'aime" /
   "Commentaires" — pas la peine d'ajouter deux catégories de plus. */
function _normalizedNotifType(type){
  if (type === 'reel_like') return 'like';
  if (type === 'reel_comment') return 'comment';
  return type || 'system';
}
function _filteredNotifications(){
  if (_activeNotifFilter === 'all') return _allNotifications;
  return _allNotifications.filter(n => _normalizedNotifType(n.type) === _activeNotifFilter);
}

function setNotifFilter(key){
  _activeNotifFilter = key;
  const listEl = document.getElementById('notifListEl');
  if (listEl) {
    const filtered = _filteredNotifications();
    listEl.innerHTML = filtered.length
      ? filtered.map(notifRow).join('')
      : `<div class="row" style="padding:24px;justify-content:center;color:var(--text-3)">Aucune notification dans cette catégorie.</div>`;
  }
  const railEl = document.querySelector('.rail');
  if (railEl) railEl.innerHTML = filterRail();
}

function mainNotif(items){
  const filtered = _filteredNotifications();
  return `
  <div class="main-col">
    <div class="card">
      <div class="card-head"><h3>Notifications</h3><span class="link" style="margin-right:14px" onclick="handleMarkAllRead()">Tout marquer comme lu</span><span class="link" onclick="location.href='settings.html'">⚙️ Paramètres</span></div>
      <div id="notifListEl">${filtered.length ? filtered.map(notifRow).join('') : `<div class="row" style="padding:24px;justify-content:center;color:var(--text-3)">Aucune notification pour le moment.</div>`}</div>
    </div>
  </div>`;
}

async function render(){
  _allNotifications = await api.getNotifications();
  initLayout({ active:'notifications', mainHTML: mainNotif(_allNotifications), rail: filterRail() });
}
render();

/* Même bug que sur profile.html : ces fonctions sont appelées depuis des
   attributs onclick inline (scope global) mais déclarées à l'intérieur
   de cette IIFE async — il faut les exposer explicitement sur window. */
window.handleNotifClick = handleNotifClick;
window.handleMarkAllRead = handleMarkAllRead;
window.setNotifFilter = setNotifFilter;

})();
</script>
</body>
</html>
