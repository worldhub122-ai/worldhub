<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Marketplace</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/app.js"></script>
<script>
function listingCard(l){
  return `
  <div class="card" style="overflow:hidden">
    <div style="height:110px;background:linear-gradient(135deg,var(--accent-dim),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff">🛒</div>
    <div class="card-pad">
      <span class="pill pill-accent">${escapeHtml(l.tag)}</span>
      <div style="font-weight:700;font-size:14.5px;margin:10px 0 4px">${escapeHtml(l.title)}</div>
      <div style="font-size:12.5px;color:var(--text-3)">Par ${escapeHtml(l.seller)} · ⭐ ${escapeHtml(String(l.rating))}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px">
        <span style="font-weight:800;font-size:16px">${escapeHtml(l.price)}</span>
        <button class="btn btn-primary btn-sm" data-listing-id="${l.id ?? ''}" onclick="handleOrder(this)">Commander</button>
      </div>
    </div>
  </div>`;
}
function marketRail(){
  return `
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">Catégories</h3>
    ${['Tous','Web','Design','Programmation','Vidéo','Marketing'].map((c,i)=>`<div class="row" style="padding:8px 0;${i===0?'color:var(--text-1);font-weight:700':'color:var(--text-2)'}">${c}</div>`).join('')}
  </div>
  <div class="card card-pad" style="text-align:center">
    <div style="font-size:28px;margin-bottom:6px">💼</div>
    <div style="font-weight:700;margin-bottom:4px">Vendez vos services</div>
    <p style="font-size:12.5px;color:var(--text-3);margin:0 0 12px">Proposez vos compétences à toute la communauté WorldHub.</p>
    <button class="btn btn-primary" style="width:100%" onclick="openCreateListingModal()">+ Créer un service</button>
  </div>`;
}

/* Create-listing modal (Issue: the button had no onclick at all,
   even though DB.createListing already existed). */
function openCreateListingModal(){
  openModal(`
    <h3 style="margin:0 0 16px">Créer un service</h3>
    <div class="field"><label>Titre</label><input id="clTitle" placeholder="ex: Développement site vitrine"></div>
    <div class="field"><label>Description</label><textarea id="clDesc" rows="3" placeholder="Décrivez votre service"></textarea></div>
    <div class="field"><label>Catégorie</label><input id="clCategory" placeholder="ex: Web, Design, Vidéo..."></div>
    <div class="field"><label>Prix (€)</label><input id="clPrice" type="number" min="0" step="1" placeholder="ex: 150"></div>
    <div id="clErr" class="err-msg" hidden style="background:var(--red-soft);border:1px solid var(--red);color:var(--text-1);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="clSubmit" onclick="submitCreateListing()">Créer</button>
    </div>`);
}
async function submitCreateListing(){
  const title = document.getElementById('clTitle').value.trim();
  const description = document.getElementById('clDesc').value.trim();
  const category = document.getElementById('clCategory').value.trim();
  const priceEuros = parseFloat(document.getElementById('clPrice').value);
  const errEl = document.getElementById('clErr');
  if (!title || isNaN(priceEuros) || priceEuros < 0){ errEl.textContent = 'Le titre et un prix valide sont requis.'; errEl.hidden = false; return; }
  if (typeof DB !== 'undefined' && DB.isConnected){
    const session = await DB.getSession();
    if (!session){ window.location.href = 'login.html'; return; }
  }
  const btn = document.getElementById('clSubmit');
  btn.disabled = true; btn.textContent = 'Création...';
  try{
    await api.createListing({ title, description, category, priceCents: Math.round(priceEuros * 100) });
    closeModal();
    showToast('Service créé ✓', 'success');
    render();
  }catch(err){
    errEl.textContent = err.message || 'Impossible de créer ce service.';
    errEl.hidden = false;
    btn.disabled = false; btn.textContent = 'Créer';
  }
}

/* Order a listing: requires login. This only records buyer intent —
   actual payment happens through a separate checkout flow/Edge Function. */
async function handleOrder(btn){
  const listingId = btn.dataset.listingId;
  if (typeof DB !== 'undefined' && DB.isConnected) {
    const session = await DB.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  }
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await api.orderListing(listingId);
    btn.textContent = 'Commandé ✓';
  } catch (err) {
    showError(err);
    btn.disabled = false;
    btn.textContent = 'Commander';
  }
}

function mainMarket(listings){
  return `
  <div class="main-col">
    <div class="card card-pad" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div style="font-size:19px;font-weight:800">Marketplace</div>
      <div class="search-box" style="max-width:280px"><span>🔍</span><input placeholder="Rechercher un service..."></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">
      ${listings.length ? listings.map(listingCard).join('') : `<div class="card card-pad" style="text-align:center;color:var(--text-3)">Aucun service pour le moment.</div>`}
    </div>
  </div>`;
}

async function render(){
  const listings = await api.getListings();
  initLayout({ active:'marketplace', mainHTML: mainMarket(listings), rail: marketRail() });
}
render();
</script>
</body>
</html>
