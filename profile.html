<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Profil</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/app.js"></script>
<script>
(async function() {
  const _session = await requireAuth();
  if (!_session) return;

function profileRail(){
  return `
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">À propos</h3>
    <p style="font-size:13.5px;color:var(--text-2);line-height:1.6;margin:0 0 14px">${escapeHtml(MOCK.user.bio)}</p>
    <h3 style="margin:16px 0 10px;font-size:15px">Compétences</h3>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${['JavaScript','TypeScript','React','Node.js','Python'].map(s=>`<span class="pill pill-muted">${s}</span>`).join('')}
    </div>
  </div>
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">Centres d’intérêt</h3>
    ${['IA & ML','Web Development','Open Source','Design System'].map(s=>`<div class="row" style="padding:8px 0">🔹 ${s}</div>`).join('')}
  </div>
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">Photos</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
      ${[13,32,15,5,22,9].map(i=>`<img src="https://i.pravatar.cc/120?img=${i}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px">`).join('')}
    </div>
  </div>`;
}

/* Small circular "change photo" button overlaid on the avatar/cover.
   Clicking it opens the matching hidden <input type="file">. */
function _photoEditBtn(inputId, extraStyle){
  return `
  <button type="button" class="icon-btn" onclick="document.getElementById('${inputId}').click()"
    title="Changer la photo"
    style="position:absolute;background:rgba(15,15,20,.65);border:1px solid var(--border-soft);${extraStyle}">📷</button>`;
}

function mainProfile(){
  const coverStyle = MOCK.user.cover
    ? `background:center/cover no-repeat url('${MOCK.user.cover}')`
    : '';
  return `
  <div class="main-col">
    <div class="card profile-card">
      <div class="profile-cover" id="profileCoverEl" style="position:relative;${coverStyle}">
        ${_photoEditBtn('coverInput', 'right:14px;bottom:14px;width:36px;height:36px;font-size:16px')}
        <input type="file" id="coverInput" accept="image/*" hidden onchange="handleCoverSelect(event)">
      </div>
      <div class="profile-head">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px">
          <div style="display:flex;align-items:flex-end;gap:14px">
            <div style="position:relative;flex:none">
              <img class="profile-avatar" id="profileAvatarEl" src="${MOCK.user.avatar}">
              ${_photoEditBtn('avatarInput', 'right:0;bottom:2px;width:30px;height:30px;font-size:14px')}
              <input type="file" id="avatarInput" accept="image/*" hidden onchange="handleAvatarSelect(event)">
            </div>
            <div>
              <div style="font-size:20px;font-weight:800;display:flex;align-items:center;gap:6px">${MOCK.user.name} <span class="pill pill-accent">✓ Vérifié</span></div>
              <div style="color:var(--text-3);font-size:13.5px">${MOCK.user.handle} · Développeur Full Stack</div>
            </div>
          </div>
          <button class="btn btn-primary" onclick="openEditProfileModal()">Modifier le profil</button>
        </div>
        <p style="color:var(--text-2);font-size:14px;margin:16px 0">${escapeHtml(MOCK.user.bio)} · 📍 Paris, France · 🔗 alexdev.io · Rejoint en janvier 2024</p>
        <div style="display:flex;gap:26px;font-size:13.5px">
          <div><b>${MOCK.user.posts}</b> <span style="color:var(--text-3)">Publications</span></div>
          <div><b>${MOCK.user.followers}</b> <span style="color:var(--text-3)">Abonnés</span></div>
          <div><b>${MOCK.user.following}</b> <span style="color:var(--text-3)">Abonnements</span></div>
        </div>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchProfileTab(this,'posts')">Publications</div>
        <div class="tab" onclick="switchProfileTab(this,'about')">À propos</div>
        <div class="tab" onclick="switchProfileTab(this,'media')">Médias</div>
        <div class="tab" onclick="switchProfileTab(this,'saved')">Enregistré</div>
      </div>
      <div id="profileTabContent">${profilePostsTabHTML()}</div>
    </div>
  </div>`;
}

function profilePostsTabHTML(){
  return MOCK.posts.slice(0,2).map(p=>`
        <div class="post">
          <div class="post-head">
            <img class="avatar" src="${MOCK.user.avatar}" style="width:40px;height:40px">
            <div><div class="u-name">${escapeHtml(MOCK.user.name)} <span class="badge-world">${escapeHtml(p.world)}</span></div><div class="u-meta">${escapeHtml(p.time)}</div></div>
            <span class="more">⋯</span>
          </div>
          <div class="post-text">${escapeHtml(p.text)}</div>
          <div class="post-stats"><span>❤️ ${p.likes} j’aime</span><span>${p.comments} commentaires</span></div>
        </div>`).join('');
}

function profileAboutTabHTML(){
  return `
    <div class="card-pad">
      <h3 style="margin:0 0 10px;font-size:15px">À propos</h3>
      <p style="font-size:13.5px;color:var(--text-2);line-height:1.6;margin:0 0 16px">${escapeHtml(MOCK.user.bio)}</p>
      <h3 style="margin:16px 0 10px;font-size:15px">Compétences</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
        ${['JavaScript','TypeScript','React','Node.js','Python'].map(s=>`<span class="pill pill-muted">${s}</span>`).join('')}
      </div>
      <h3 style="margin:16px 0 10px;font-size:15px">Centres d’intérêt</h3>
      ${['IA & ML','Web Development','Open Source','Design System'].map(s=>`<div class="row" style="padding:8px 0">🔹 ${s}</div>`).join('')}
    </div>`;
}

function profileMediaTabHTML(){
  return `
    <div class="card-pad">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${[13,32,15,5,22,9,51,8].map(i=>`<img src="https://i.pravatar.cc/240?img=${i}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px">`).join('')}
      </div>
    </div>`;
}

/* Switch the active profile tab and load its content on demand
   (Issue: tabs were purely decorative and never changed anything). */
async function switchProfileTab(tabEl, tab){
  document.querySelectorAll('.profile-card .tabs .tab').forEach(t=>t.classList.remove('active'));
  tabEl.classList.add('active');
  const container = document.getElementById('profileTabContent');
  if (!container) return;
  if (tab === 'posts') { container.innerHTML = profilePostsTabHTML(); return; }
  if (tab === 'about') { container.innerHTML = profileAboutTabHTML(); return; }
  if (tab === 'media') { container.innerHTML = profileMediaTabHTML(); return; }
  if (tab === 'saved') {
    container.innerHTML = `<div class="card-pad" style="text-align:center;color:var(--text-3)">Chargement...</div>`;
    try {
      const saved = await api.getSavedPosts();
      container.innerHTML = saved.length
        ? saved.map(p=>`
          <div class="post">
            <div class="post-head">
              <div><div class="u-name">${escapeHtml(p.author)}</div><div class="u-meta">${escapeHtml(p.time)}</div></div>
            </div>
            <div class="post-text">${escapeHtml(p.text)}</div>
            <div class="post-stats"><span>❤️ ${p.likes} j’aime</span><span>${p.comments} commentaires</span></div>
          </div>`).join('')
        : `<div class="card-pad" style="text-align:center;color:var(--text-3)">Aucun élément enregistré pour le moment.</div>`;
    } catch (err) {
      container.innerHTML = `<div class="card-pad" style="text-align:center;color:var(--text-3)">Connectez-vous pour voir vos éléments enregistrés.</div>`;
    }
  }
}

/* Edit-profile modal (Issue: "Modifier le profil" had no onclick). */
function openEditProfileModal(){
  const parts = (MOCK.user.name || '').split(' ');
  const firstName = parts[0] || '';
  const lastName = parts.slice(1).join(' ');
  openModal(`
    <h3 style="margin:0 0 16px">Modifier le profil</h3>
    <div class="field"><label>Prénom</label><input id="epFirst" value="${escapeHtml(firstName)}"></div>
    <div class="field"><label>Nom</label><input id="epLast" value="${escapeHtml(lastName)}"></div>
    <div class="field"><label>Nom d'utilisateur</label><input id="epHandle" value="${escapeHtml((MOCK.user.handle||'').replace(/^@/,''))}"></div>
    <div class="field"><label>Bio</label><textarea id="epBio" rows="3">${escapeHtml(MOCK.user.bio||'')}</textarea></div>
    <div id="epErr" class="err-msg" hidden style="background:var(--red-soft);border:1px solid var(--red);color:var(--text-1);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="epSubmit" onclick="submitEditProfile()">Enregistrer</button>
    </div>`);
}
async function submitEditProfile(){
  const first_name = document.getElementById('epFirst').value.trim();
  const last_name = document.getElementById('epLast').value.trim();
  const handleRaw = document.getElementById('epHandle').value.trim().replace(/^@/,'');
  const bio = document.getElementById('epBio').value.trim();
  const errEl = document.getElementById('epErr');
  if (!first_name){ errEl.textContent = 'Le prénom est requis.'; errEl.hidden = false; return; }
  const btn = document.getElementById('epSubmit');
  btn.disabled = true; btn.textContent = 'Enregistrement...';
  try {
    await api.updateProfile({ first_name, last_name, handle: '@' + handleRaw, bio });
    MOCK.user.name = (first_name + ' ' + last_name).trim();
    MOCK.user.handle = '@' + handleRaw;
    MOCK.user.bio = bio;
    closeModal();
    showToast('Profil mis à jour ✓', 'success');
    initLayout({ active:'profile', mainHTML: mainProfile(), rail: profileRail() });
  } catch (err) {
    errEl.textContent = err.message || 'Impossible de mettre à jour le profil.';
    errEl.hidden = false;
    btn.disabled = false; btn.textContent = 'Enregistrer';
  }
}

/* ── Avatar/cover upload handlers (Issues 7/8) ──
   Validate + upload via api.uploadAvatar/api.uploadCover, then patch the
   image on the page and the topbar avatar without a full reload. Reverts
   the file input (and shows an error toast) if the upload fails. */
async function handleAvatarSelect(evt){
  const file = evt.target.files?.[0];
  evt.target.value = ''; // allow re-selecting the same file later
  if (!file) return;
  const img = document.getElementById('profileAvatarEl');
  const prevSrc = img ? img.src : null;
  try {
    const url = await api.uploadAvatar(file);
    MOCK.user.avatar = url;
    if (img) img.src = url;
    const topbarAvatar = document.querySelector('.avatar-btn img');
    if (topbarAvatar) topbarAvatar.src = url;
  } catch (err) {
    if (img && prevSrc) img.src = prevSrc;
    showError(err);
  }
}

async function handleCoverSelect(evt){
  const file = evt.target.files?.[0];
  evt.target.value = '';
  if (!file) return;
  const coverEl = document.getElementById('profileCoverEl');
  try {
    const url = await api.uploadCover(file);
    MOCK.user.cover = url;
    if (coverEl) coverEl.style.background = `center/cover no-repeat url('${url}')`;
  } catch (err) {
    showError(err);
  }
}

// Issue 5: load real profile from Supabase
(async function loadProfile() {
  const p = await api.getCurrentProfile();
  // Patch MOCK.user so all template functions pick up real data
  MOCK.user.name      = p.name;
  MOCK.user.handle    = p.handle;
  MOCK.user.avatar    = p.avatar;
  MOCK.user.cover     = p.cover || null;
  MOCK.user.bio       = p.bio;
  MOCK.user.followers = typeof p.followers === 'number' ? p.followers.toLocaleString('fr') : p.followers;
  MOCK.user.following = typeof p.following === 'number' ? p.following.toLocaleString('fr') : p.following;
  initLayout({ active:'profile', mainHTML: mainProfile(), rail: profileRail() });
})();

})();
</script>
</body>
</html>
