<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — الملف الشخصي</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="sidebar.css">
<link rel="stylesheet" href="tabs.css">
<link rel="stylesheet" href="modals.css">
<style>
  .profile-head{ padding:28px 20px 16px; display:flex; flex-direction:column; align-items:center; text-align:center; }
  .profile-avatar{ width:96px; height:96px; border-radius:50%; border:3px solid var(--bg-card); box-shadow:0 0 0 3px var(--story-ring, var(--accent)); display:flex; align-items:center; justify-content:center; font-size:36px; font-weight:800; color:#fff; }
  .profile-name{ font-family:var(--font-display); font-size:19px; font-weight:900; display:flex; align-items:center; gap:6px; margin-top:14px; }
  .profile-handle{ color:var(--text-faint); font-size:13.5px; margin-top:2px; }
  .profile-bio{ margin-top:10px; font-size:13.5px; color:var(--text-dim); max-width:420px; }
  .profile-stats{ display:flex; gap:30px; margin-top:18px; }
  .profile-stats div{ text-align:center; }
  .profile-stats b{ font-family:var(--font-display); font-size:17px; display:block; }
  .profile-stats span{ color:var(--text-faint); font-size:12px; }
  .profile-actions{ display:flex; gap:10px; margin-top:16px; width:100%; max-width:320px; }
  .profile-actions .btn{ flex:1; }
  .skill-chip{ display:inline-flex; padding:6px 13px; border-radius:99px; background:var(--bg-elevated); border:1px solid var(--border); font-size:12px; font-weight:700; color:var(--text-dim); }

  .view-toggle{ display:flex; border-top:1px solid var(--border-soft); }
  .view-toggle button{ flex:1; padding:12px; display:flex; align-items:center; justify-content:center; color:var(--text-faint); border-bottom:2px solid transparent; }
  .view-toggle button.active{ color:var(--text); border-bottom-color:var(--text); }
  .view-toggle svg{ width:22px; height:22px; }

  .post-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
  .post-grid__item{ position:relative; aspect-ratio:1; overflow:hidden; background:var(--bg-elevated); cursor:pointer; }
  .post-grid__item img, .post-grid__item video{ width:100%; height:100%; object-fit:cover; }
  .post-grid__item .text-tile{ width:100%; height:100%; padding:10px; font-size:11px; line-height:1.4; color:var(--text-dim); display:flex; align-items:center; justify-content:center; text-align:center; background:var(--bg-input); }
  .post-grid__item .video-badge{ position:absolute; top:6px; left:6px; color:#fff; filter:drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
  .post-grid__item .video-badge svg{ width:16px; height:16px; }
</style>
</head>
<body data-page="profile">

<header class="topbar">
  <a href="index.html" class="brand"><div class="brand__mark">🌍</div><div class="brand__name">World<span>Hub</span></div></a>
  <div class="topbar__search"><span id="ic-search"></span><input type="text" placeholder="ابحث..."><span class="kbd">⌘K</span></div>
  <div class="topbar__actions">
    <a href="notifications.html" class="icon-btn"><span class="badge">8</span><span id="ic-bell"></span></a>
    <a href="messages.html" class="icon-btn"><span class="badge">3</span><span id="ic-msg"></span></a>
    <a href="profile.html"><img class="avatar" width="40" height="40" src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?q=80&w=200&auto=format&fit=crop"></a>
  </div>
</header>

<div class="layout layout--narrow">
  <aside class="col-right col-sticky">
    <nav class="nav">
      <a href="index.html" class="nav__link" data-page="home">${nav-home}<span>الرئيسية</span></a>
      <a href="reels.html" class="nav__link" data-page="reels">${nav-reels}<span>الريلز</span></a>
      <a href="messages.html" class="nav__link" data-page="messages">${nav-messages}<span>الرسائل</span></a>
      <a href="notifications.html" class="nav__link" data-page="notifications">${nav-bell}<span>الإشعارات</span></a>
      <a href="worlds.html" class="nav__link" data-page="worlds">${nav-globe}<span>العوالم</span></a>
      <a href="dashboard.html" class="nav__link" data-page="dashboard">${nav-dashboard}<span>لوحة المعلومات</span></a>
      <a href="profile.html" class="nav__link" data-page="profile">${nav-user}<span>الملف الشخصي</span></a>
    </nav>
  </aside>

  <main class="col-center">
    <div class="card">
      <div class="profile-head">
        <div class="profile-avatar" id="pAvatar"></div>
        <div class="profile-name" id="pName"></div>
        <div class="profile-handle" id="pHandle"></div>
        <div class="profile-bio" id="pBio"></div>
        <div class="flex gap-8 mt-12" style="flex-wrap:wrap;justify-content:center;">
          <span class="skill-chip">💻 JavaScript</span>
          <span class="skill-chip">🎨 UI/UX</span>
          <span class="skill-chip">🤖 AI</span>
          <span class="skill-chip">📈 نمو المنتجات</span>
        </div>
        <div class="profile-stats">
          <div><b id="sPosts"></b><span>منشور</span></div>
          <div><b id="sFollowers"></b><span>متابع</span></div>
          <div><b id="sFollowing"></b><span>متابَع</span></div>
          <div><b id="sPoints"></b><span>نقطة</span></div>
        </div>
        <div class="profile-actions">
          <button class="btn btn-secondary" id="editProfileBtn">تعديل الملف</button>
          <button class="btn btn-primary" id="followBtn">متابعة</button>
        </div>
      </div>

      <div class="view-toggle">
        <button class="active" id="viewGridBtn" title="شبكة">${view-grid}</button>
        <button id="viewListBtn" title="قائمة">${view-list}</button>
      </div>
      <div id="feedRoot"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="auth-guard.js"></script>
<script src="app.js"></script>
<script>
  const iconMap = {'ic-search':'search','ic-bell':'bell','ic-msg':'messages','nav-home':'home','nav-reels':'reels','nav-messages':'messages','nav-bell':'bell','nav-globe':'globe','nav-dashboard':'dashboard','nav-user':'user'};
  document.body.innerHTML = document.body.innerHTML.replace(/\$\{([a-z0-9\-]+)\}/g, (_, key) => WH.ICONS[iconMap[key]] || '');
  // أيقونات عرض إضافية غير موجودة في مجموعة الأيقونات المشتركة
  document.getElementById('viewGridBtn').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>`;
  document.getElementById('viewListBtn').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>`;

  const me = WH.person('alex'); // عرض توضيحي: حساب Alex Dev الشخصي
  document.getElementById('pAvatar').style.background = me.color;
  document.getElementById('pAvatar').textContent = me.avatar;
  document.getElementById('pName').innerHTML = me.name + (me.verified?` <svg class="verified" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 2.1 3.1-.6 1 3 3 1-.6 3.1L23 12l-2.1 2.4.6 3.1-3 1-1 3-3.1-.6L12 23l-2.4-2.1-3.1.6-1-3-3-1 .6-3.1L1 12l2.1-2.4-.6-3.1 3-1 1-3 3.1.6z"/></svg>`:'');
  document.getElementById('pHandle').textContent = me.handle;
  document.getElementById('pBio').textContent = me.bio;
  document.getElementById('sFollowers').textContent = WH.fmt(me.followers);
  document.getElementById('sFollowing').textContent = WH.fmt(me.following);
  document.getElementById('sPoints').textContent = WH.fmt(me.points);

  document.getElementById('editProfileBtn').addEventListener('click', ()=> WH.toast('تعديل الملف الشخصي (الغلاف، النبذة، المهارات) قادم قريباً ✏️'));

  const followBtn = document.getElementById('followBtn');
  function paintFollow(){
    const f = WH.state.following[me.id];
    followBtn.textContent = f ? 'إلغاء المتابعة' : 'متابعة';
    followBtn.className = 'btn ' + (f ? 'btn-secondary' : 'btn-primary');
  }
  paintFollow();
  followBtn.addEventListener('click', ()=>{
    WH.state.following[me.id] = !WH.state.following[me.id]; WH.save(); paintFollow();
    WH.toast(WH.state.following[me.id] ? `أنت الآن تتابع ${me.name}` : `ألغيت متابعة ${me.name}`);
  });

  const feedRoot = document.getElementById('feedRoot');
  let currentView = 'grid';
  let currentPosts = []; // آخر مجموعة منشورات تم تحميلها (تُستخدم لإعادة الرسم عند تبديل العرض)
  let currentUserId = null;
  let currentSavedIds = new Set();

  function gridTileHTML(p, isLive){
    const id = p.id;
    const img = isLive ? p.image_url : p.image;
    const vid = isLive ? p.video_url : p.video;
    const text = isLive ? p.content : p.text;
    let media = '';
    if(vid) media = `<video src="${vid}" muted></video><span class="video-badge">${WH.ICONS.video||''}▶</span>`;
    else if(img) media = `<img src="${img}" alt="">`;
    else media = `<div class="text-tile truncate" style="-webkit-line-clamp:5;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;">${text}</div>`;
    return `<a class="post-grid__item" href="post.html?id=${id}${isLive?'':'&demo=1'}">${media}</a>`;
  }

  function renderView(){
    if(!currentPosts.length){
      feedRoot.innerHTML = `<div class="empty-state"><div class="icon">📝</div>لا توجد منشورات بعد</div>`;
      return;
    }
    if(currentView === 'grid'){
      feedRoot.innerHTML = `<div class="post-grid">${currentPosts.map(p=>gridTileHTML(p, WH.isLive())).join('')}</div>`;
    } else if(WH.isLive()){
      feedRoot.innerHTML = currentPosts.map(p=>WH.livePostCardHTML(p, currentUserId, currentSavedIds)).join('');
      WH.bindLivePostEvents(feedRoot);
    } else {
      feedRoot.innerHTML = currentPosts.map(WH.postCardHTML).join('');
      WH.bindPostEvents(feedRoot);
    }
  }

  document.getElementById('viewGridBtn').addEventListener('click', ()=>{
    currentView = 'grid';
    document.getElementById('viewGridBtn').classList.add('active');
    document.getElementById('viewListBtn').classList.remove('active');
    renderView();
  });
  document.getElementById('viewListBtn').addEventListener('click', ()=>{
    currentView = 'list';
    document.getElementById('viewListBtn').classList.add('active');
    document.getElementById('viewGridBtn').classList.remove('active');
    renderView();
  });

  if(WH.isLive()){
    loadLive();
  } else {
    currentPosts = WH.state.posts.filter(p=>p.author===me.id);
    document.getElementById('sPosts').textContent = currentPosts.length;
    renderView();
  }

  async function loadLive(){
    feedRoot.innerHTML = `<div class="empty-state"><div class="icon">⏳</div>جارٍ التحميل...</div>`;
    try{
      const user = await DB.getCurrentUser();
      if(!user){ feedRoot.innerHTML = `<div class="empty-state"><div class="icon">🔒</div>يجب تسجيل الدخول</div>`; return; }
      currentUserId = user.id;
      const [posts, savedIdsArr] = await Promise.all([
        DB.listPosts({ authorId: user.id, limit:50 }),
        DB.listSavedPostIds().catch(()=>[]),
      ]);
      currentSavedIds = new Set(savedIdsArr);
      currentPosts = posts;
      document.getElementById('sPosts').textContent = posts.length;
      renderView();
    }catch(err){
      feedRoot.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>تعذر تحميل المنشورات: ${err.message}</div>`;
    }
  }
</script>
</body>
</html>
