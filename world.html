<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Monde</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/app.js"></script>
<script>
/* Which world are we viewing? Comes from ?id=programming (etc.) in the
   URL — falls back to 'programming' if the page was opened without one. */
const WORLD_ID = new URLSearchParams(location.search).get('id') || 'programming';

let _world = null;
let _isMember = false;

function worldRail(world){
  return `
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">À propos</h3>
    <p style="font-size:13.5px;color:var(--text-2);line-height:1.6">${escapeHtml(world.description || 'Un espace pour échanger, partager et progresser ensemble dans cette communauté.')}</p>
    <div class="row" style="padding:8px 0"><span>📁</span>&nbsp; Catégorie: ${escapeHtml(world.name)}</div>
    <div class="row" style="padding:8px 0"><span>👥</span>&nbsp; ${escapeHtml(String(world.members || 0))} membres</div>
    <div class="row" style="padding:8px 0"><span>🌐</span>&nbsp; Français</div>
  </div>
  <div class="card">
    <div class="card-head"><h3>Ressources populaires</h3></div>
    <div class="row"><div><div class="row-title">JavaScript Roadmap</div><div class="row-sub">Guide complet</div></div></div>
    <div class="row"><div><div class="row-title">React Documentation officielle</div><div class="row-sub">Référence</div></div></div>
    <div class="row"><div><div class="row-title">Node.js Best Practices</div><div class="row-sub">Guide</div></div></div>
  </div>
  <div class="card">
    <div class="card-head"><h3>Admins</h3></div>
    ${MOCK.topMembers.slice(0,2).map(m=>`
      <div class="row"><img class="avatar" src="${m.avatar}" style="width:34px;height:34px"><div><div class="row-title">${escapeHtml(m.name)}</div><div class="row-sub">${m.meta.includes('@')?escapeHtml(m.meta):'@'+m.name.toLowerCase().replace(' ','.')}</div></div></div>`).join('')}
  </div>`;
}

function worldPostCard(p){
  const pid = p.actionId || p.id;
  return `
  <div class="post">
    ${repostBannerHTML(p)}
    <div class="post-head">
      <img class="avatar" src="${p.avatarUrl || ('https://i.pravatar.cc/80?u='+encodeURIComponent(p.handle||p.author))}" style="width:40px;height:40px">
      <div><div class="u-name">${escapeHtml(p.author)}</div><div class="u-meta">${escapeHtml(p.time)}</div></div>
      ${moreMenuHTML(p)}
    </div>
    <div class="post-text">${renderPostText(p.text)}</div>
    ${p.code?`<div class="code-card">${p.code}</div>`:''}
    ${p.imageUrl ? `<img src="${p.imageUrl}" style="max-width:100%;border-radius:10px;margin-top:8px;display:block">` : ''}
    ${p.videoUrl ? `<video src="${p.videoUrl}" controls style="max-width:100%;border-radius:10px;margin-top:8px;display:block"></video>` : ''}
    ${quotedPostHTML(p)}
    ${pollPlaceholderHTML(p)}
    <div class="post-stats"><span>❤️ ${p.likes} j’aime</span><span class="comments-count">${p.comments} commentaires</span></div>
    <div class="post-actions">
      <div class="a-btn" data-like data-post-id="${pid}"><span>🤍</span> J’aime <span class="count">${p.likes}</span></div>
      <div class="a-btn" onclick="toggleCommentBox('${pid}')">💬 Commenter</div>
      ${repostButtonHTML(p)}
      <div class="a-btn" onclick="handleShare('${pid}')">🔗 Partager</div>
    </div>
    <div class="comment-box" id="cbox-${pid}" hidden style="display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border-soft)">
      <img class="avatar" src="${MOCK.user.avatar}" style="width:28px;height:28px;flex:none">
      <input type="text" placeholder="Écrire un commentaire... (@mention #tag)" id="cinput-${pid}" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:8px 14px;color:var(--text-1);font-size:13.5px" onkeydown="if(event.key==='Enter') submitComment('${pid}')">
      <button class="btn btn-primary btn-sm" onclick="submitComment('${pid}')">Envoyer</button>
    </div>
  </div>`;
}

/* Same inline-reply + share behaviour as index.html (Issue: comment
   button only redirected to create-post.html; share button did nothing). */
function toggleCommentBox(postId){
  const box = document.getElementById('cbox-' + postId);
  if (!box) return;
  box.hidden = !box.hidden;
  if (!box.hidden) document.getElementById('cinput-' + postId)?.focus();
}

async function submitComment(postId){
  const input = document.getElementById('cinput-' + postId);
  const text = input?.value.trim();
  if (!text) return;
  if (typeof DB !== 'undefined' && DB.isConnected) {
    const session = await DB.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  }
  input.disabled = true;
  try {
    await api.addComment(postId, text);
    input.value = '';
    const post = document.querySelector(`[data-post-id="${postId}"]`)?.closest('.post');
    const countEl = post?.querySelector('.comments-count');
    if (countEl) countEl.textContent = `${(parseInt(countEl.textContent.replace(/\D/g,''))||0)+1} commentaires`;
    showToast('Commentaire ajouté ✓', 'success');
  } catch (err) {
    showError(err);
  } finally {
    input.disabled = false;
  }
}

async function handleShare(postId){
  const url = `${location.origin}${location.pathname}${location.search}&post=${encodeURIComponent(postId)}`;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Lien copié dans le presse-papiers ✓', 'success');
  } catch (err) {
    showToast(url, 'info');
  }
}

/* Join/leave this world: requires login, toggles button state,
   reverts if the write fails (same optimistic-but-honest pattern
   used for follow/RSVP/order buttons elsewhere). */
async function handleJoinWorld(btn){
  if (typeof DB !== 'undefined' && DB.isConnected) {
    const session = await DB.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  }
  const wasMember = _isMember;
  btn.disabled = true;
  try {
    _isMember = await api.toggleWorldMembership(WORLD_ID);
    btn.textContent = _isMember ? 'Rejoint ✓' : 'Rejoindre';
    btn.classList.toggle('btn-outline', _isMember);
    btn.classList.toggle('btn-primary', !_isMember);
  } catch (err) {
    _isMember = wasMember;
    showError(err);
  } finally {
    btn.disabled = false;
  }
}

function mainWorld(world, posts){
  return `
  <div class="main-col">
    <div class="world-cover">
      <div class="glyph-lg">${world.icon || '🌍'}</div>
      <div>
        <div style="font-size:24px;font-weight:800">${escapeHtml(world.name)}</div>
        <div style="color:var(--text-2);font-size:13.5px;margin:4px 0 14px">${escapeHtml(String(world.members || 0))} Membres · 🌍 Public</div>
        <p style="color:var(--text-2);font-size:13.5px;max-width:520px;margin:0 0 14px">${escapeHtml(world.description || 'Partagez vos connaissances, posez vos questions et progressez ensemble.')}</p>
        <button class="btn ${_isMember?'btn-outline':'btn-primary'}" onclick="handleJoinWorld(this)">${_isMember?'Rejoint ✓':'Rejoindre'}</button>
      </div>
    </div>
    <div class="card">
      <div class="tabs">
        <div class="tab active">Publications</div>
        <div class="tab">Membres</div>
        <div class="tab">Événements</div>
        <div class="tab">Ressources</div>
      </div>
      <div class="composer">
        <div class="composer-top">
          <img class="avatar" src="${MOCK.user.avatar}" style="width:38px;height:38px">
          <div class="fake-input" onclick="location.href='create-post.html'">Quoi de neuf dans ${escapeHtml(world.name)} ?</div>
        </div>
        <div class="composer-actions">
          <div class="chip blue" onclick="location.href='create-post.html'">🖼️ Image</div><div class="chip" onclick="location.href='create-post.html'">🎬 Vidéo</div><div class="chip green" onclick="location.href='create-post.html'">📊 Sondage</div>
          <div class="spacer"></div><button class="btn btn-primary btn-sm" onclick="location.href='create-post.html'">Publier</button>
        </div>
      </div>
      ${posts.length ? posts.map(worldPostCard).join('') : `<div class="card-pad" style="text-align:center;color:var(--text-3)">Aucune publication pour le moment dans ce monde.</div>`}
    </div>
  </div>`;
}

async function render(){
  const [world, posts, isMember] = await Promise.all([
    api.getWorld(WORLD_ID),
    api.getWorldPosts(WORLD_ID),
    api.isWorldMember(WORLD_ID),
  ]);
  _world = world;
  _isMember = isMember;
  if (typeof DB !== 'undefined' && DB.isConnected) {
    try { const me = await DB.getCurrentUser(); _feedUserId = me?.id || null; } catch { _feedUserId = null; }
  }
  _feedPostsById = {};
  posts.forEach(p => { _feedPostsById[p.actionId || p.id] = p; });
  initLayout({ active: WORLD_ID, mainHTML: mainWorld(world, posts), rail: worldRail(world) });
  hydratePollsIn(posts);
}
render();
</script>
</body>
</html>
