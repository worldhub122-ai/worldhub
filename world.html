<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Monde</title>
<meta name="description" content="Rejoignez cette communauté sur WorldHub : publications, membres, événements et ressources partagées.">
<link rel="stylesheet" href="assets/css/main.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4171449506245617" crossorigin="anonymous"></script>
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/app.js"></script>
<script>
/* Which world are we viewing? Comes from ?id=programming (etc.) in the
   URL — falls back to 'programming' if the page was opened without one. */
const WORLD_ID = new URLSearchParams(location.search).get('id') || 'programming';

let _world = null;
let _isMember = false;
let _myRole = null;      // 'owner' | 'admin' | 'member' | null
let _meId = null;
let _worldPosts = [];
let _worldMembers = null;
let _worldEvents = null;     // lazy-loaded on first "Événements" tab click
let _worldResources = null;
let _worldSearchActive = false;
let _inviteSearchTimer = null;
let _inviteSearchToken = 0;
const ROLE_LABEL = { owner:'Propriétaire', admin:'Admin', member:'Membre' };
const RESOURCE_ICON = { link:'🔗', video:'🎬', article:'📄', doc:'📚' };

/* Issue: "Admins" showed MOCK.topMembers (unrelated to this world at
   all) and "Ressources populaires" was 3 hardcoded links that never
   changed. Both api.getWorldMembers() and api.getWorldResources()
   already existed and are now fetched once in render(), so the rail
   can show this world's real admins/owner and real resources. */
function worldRail(world, members, resources){
  const admins = (members||[]).filter(m => m.role === 'owner' || m.role === 'admin').slice(0,3);
  return `
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">À propos</h3>
    <p style="font-size:13.5px;color:var(--text-2);line-height:1.6">${escapeHtml(world.description || 'Un espace pour échanger, partager et progresser ensemble dans cette communauté.')}</p>
    <div class="row" style="padding:8px 0"><span>📁</span>&nbsp; Catégorie: ${escapeHtml(world.name)}</div>
    <div class="row" style="padding:8px 0"><span>👥</span>&nbsp; ${escapeHtml(String(world.members || 0))} membres</div>
    <div class="row" style="padding:8px 0"><span>🌐</span>&nbsp; Français</div>
  </div>
  <div class="card">
    <div class="card-head"><h3>Ressources populaires</h3></div>
    ${(resources||[]).length ? resources.slice(0,3).map(r=>`
      <div class="row"><a href="${r.url}" target="_blank" rel="noopener" style="display:flex;gap:10px;align-items:center;color:inherit;text-decoration:none;width:100%">
        <span style="font-size:16px">${RESOURCE_ICON[r.type]||'🔗'}</span>
        <div><div class="row-title">${escapeHtml(r.title)}</div><div class="row-sub">Ajouté par ${escapeHtml(r.addedBy)}</div></div>
      </a></div>`).join('') : `<div class="row" style="color:var(--text-3);font-size:13px;padding:12px 16px">Aucune ressource pour le moment.</div>`}
  </div>
  <div class="card">
    <div class="card-head"><h3>Admins</h3></div>
    ${admins.length ? admins.map(m=>`
      <div class="row" style="cursor:pointer" onclick="location.href='profile.html?id=${encodeURIComponent(m.id)}'">
        <img class="avatar" src="${m.avatar}" alt="${escapeHtml(m.name)}" style="width:34px;height:34px">
        <div><div class="row-title">${escapeHtml(m.name)}</div><div class="row-sub">${escapeHtml(m.handle || ROLE_LABEL[m.role] || '')}</div></div>
      </div>`).join('') : `<div class="row" style="color:var(--text-3);font-size:13px;padding:12px 16px">Aucun admin pour le moment.</div>`}
  </div>`;
}

function worldPostCard(p){
  return `
  <div class="post">
    <div class="post-head">
      <img class="avatar" src="${p.avatarUrl || ('https://i.pravatar.cc/80?u='+encodeURIComponent(p.handle||p.author))}" alt="${escapeHtml(p.author||'')}" style="width:40px;height:40px">
      <div><div class="u-name">${escapeHtml(p.author)}</div><div class="u-meta">${escapeHtml(p.time)}</div></div>
      <span class="more">⋯</span>
    </div>
    <div class="post-text">${escapeHtml(p.text)}</div>
    ${p.code?`<div class="code-card">${p.code}</div>`:''}
    ${p.imageUrl ? `<img src="${p.imageUrl}" style="max-width:100%;border-radius:10px;margin-top:8px;display:block">` : ''}
    ${p.videoUrl ? `<video src="${p.videoUrl}" controls style="max-width:100%;border-radius:10px;margin-top:8px;display:block"></video>` : ''}
    <div class="post-stats"><span>❤️ ${p.likes} j’aime</span><span class="comments-count">${p.comments} commentaires</span></div>
    <div class="post-actions">
      <div class="a-btn" data-like data-post-id="${p.id || ''}"><span>🤍</span> J’aime <span class="count">${p.likes}</span></div>
      <div class="a-btn" onclick="toggleCommentBox('${p.id || ''}')">💬 Commenter</div>
      <div class="a-btn" onclick="handleShare('${p.id || ''}')">🔄 Partager</div>
    </div>
    <div class="comment-box" id="cbox-${p.id || ''}" hidden style="display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border-soft)">
      <img class="avatar" src="${MOCK.user.avatar}" alt="" style="width:28px;height:28px;flex:none">
      <input type="text" placeholder="Écrire un commentaire..." id="cinput-${p.id || ''}" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:8px 14px;color:var(--text-1);font-size:13.5px" onkeydown="if(event.key==='Enter') submitComment('${p.id || ''}')">
      <button class="btn btn-primary btn-sm" onclick="submitComment('${p.id || ''}')">Envoyer</button>
    </div>
  </div>`;
}

/* Same inline-reply + share behaviour as index.html (Issue: comment
   button only redirected to create-post.html; share button did nothing). */
function toggleCommentBox(postId){
  const box = document.getElementById('cbox-' + postId);
  if (!box) return;
  box.hidden = !box.hidden;
  if (!box.hidden) document.getElementById('cinput-' + postId)?.focus();
}

async function submitComment(postId){
  const input = document.getElementById('cinput-' + postId);
  const text = input?.value.trim();
  if (!text) return;
  if (typeof DB !== 'undefined' && DB.isConnected) {
    const session = await DB.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  }
  input.disabled = true;
  try {
    await api.addComment(postId, text);
    input.value = '';
    const post = document.querySelector(`[data-post-id="${postId}"]`)?.closest('.post');
    const countEl = post?.querySelector('.comments-count');
    if (countEl) countEl.textContent = `${(parseInt(countEl.textContent.replace(/\D/g,''))||0)+1} commentaires`;
    showToast('Commentaire ajouté ✓', 'success');
  } catch (err) {
    showError(err);
  } finally {
    input.disabled = false;
  }
}

async function handleShare(postId){
  const url = `${location.origin}${location.pathname}${location.search}&post=${encodeURIComponent(postId)}`;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Lien copié dans le presse-papiers ✓', 'success');
  } catch (err) {
    showToast(url, 'info');
  }
}

/* Join/leave this world: requires login, toggles button state,
   reverts if the write fails (same optimistic-but-honest pattern
   used for follow/RSVP/order buttons elsewhere). */
async function handleJoinWorld(btn){
  if (typeof DB !== 'undefined' && DB.isConnected) {
    const session = await DB.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  }
  const wasMember = _isMember;
  btn.disabled = true;
  try {
    _isMember = await api.toggleWorldMembership(WORLD_ID);
    btn.textContent = _isMember ? 'Rejoint ✓' : 'Rejoindre';
    btn.classList.toggle('btn-outline', _isMember);
    btn.classList.toggle('btn-primary', !_isMember);
  } catch (err) {
    _isMember = wasMember;
    showError(err);
  } finally {
    btn.disabled = false;
  }
}

/* ── Tab content builders ─────────────────────────────────────
   Issue: the 4 tabs (Publications/Membres/Événements/Ressources)
   were plain <div class="tab"> with no onclick at all — clicking
   them did nothing, and only "Publications" ever had real content.
   api.getWorldMembers()/api.getEvents()/api.getWorldResources() all
   already existed and worked, they just had nowhere to render. ── */
/* Issue: api.searchInWorld() already existed in app.js (scoped search
   inside a single world's posts) but there was no search box anywhere
   on this page to call it — only the global topbar search existed. */
function worldPostsTabHTML(posts){
  return `
    <div class="card-pad" style="padding-bottom:0;display:flex;gap:10px;align-items:center">
      <div class="search-box" style="flex:1;max-width:none">
        <span>🔍</span>
        <input type="text" id="worldSearchInput" placeholder="Rechercher dans ${escapeHtml(_world.name)}..."
               onkeydown="if(event.key==='Enter'){ event.preventDefault(); handleWorldSearch(this.value.trim()); }">
      </div>
      <span class="link" id="worldSearchClear" style="font-size:12.5px;cursor:pointer;white-space:nowrap" ${_worldSearchActive?'':'hidden'} onclick="clearWorldSearch()">✕ Effacer</span>
    </div>
    <div class="composer">
      <div class="composer-top">
        <img class="avatar" src="${MOCK.user.avatar}" alt="" style="width:38px;height:38px">
        <div class="fake-input" onclick="location.href='create-post.html?world=${encodeURIComponent(WORLD_ID)}'">Quoi de neuf dans ${escapeHtml(_world.name)} ?</div>
      </div>
      <div class="composer-actions">
        <div class="chip blue" onclick="location.href='create-post.html?world=${encodeURIComponent(WORLD_ID)}'">🖼️ Image</div><div class="chip" onclick="location.href='create-post.html?world=${encodeURIComponent(WORLD_ID)}'">🎬 Vidéo</div><div class="chip green" onclick="location.href='create-post.html?world=${encodeURIComponent(WORLD_ID)}'">📊 Sondage</div>
        <div class="spacer"></div><button class="btn btn-primary btn-sm" onclick="location.href='create-post.html?world=${encodeURIComponent(WORLD_ID)}'">Publier</button>
      </div>
    </div>
    <div id="worldPostsListWrap">${_renderWorldPostsList(posts)}</div>`;
}
function _renderWorldPostsList(posts){
  if (posts.length) return posts.map(worldPostCard).join('');
  return `<div class="card-pad" style="text-align:center;color:var(--text-3)">${_worldSearchActive ? 'Aucun résultat pour cette recherche.' : 'Aucune publication pour le moment dans ce monde.'}</div>`;
}
async function handleWorldSearch(q){
  if (!q) { clearWorldSearch(); return; }
  _worldSearchActive = true;
  const clearBtn = document.getElementById('worldSearchClear');
  if (clearBtn) clearBtn.hidden = false;
  const wrap = document.getElementById('worldPostsListWrap');
  if (wrap) wrap.innerHTML = `<div class="card-pad" style="text-align:center;color:var(--text-3)">Recherche...</div>`;
  try {
    const results = await api.searchInWorld(WORLD_ID, q);
    if (wrap) { wrap.innerHTML = _renderWorldPostsList(results); wireGlobalInteractions(); }
  } catch (err) {
    if (wrap) wrap.innerHTML = `<div class="card-pad" style="text-align:center;color:var(--text-3)">Erreur de recherche. Réessayez.</div>`;
  }
}
function clearWorldSearch(){
  _worldSearchActive = false;
  const input = document.getElementById('worldSearchInput');
  if (input) input.value = '';
  const clearBtn = document.getElementById('worldSearchClear');
  if (clearBtn) clearBtn.hidden = true;
  const wrap = document.getElementById('worldPostsListWrap');
  if (wrap) { wrap.innerHTML = _renderWorldPostsList(_worldPosts); wireGlobalInteractions(); }
}
window.handleWorldSearch = handleWorldSearch;
window.clearWorldSearch = clearWorldSearch;

function worldMembersTabHTML(members){
  const header = `<div class="card-pad" style="display:flex;justify-content:flex-end">
    <button class="btn btn-primary btn-sm" onclick="openInviteModal()">+ Inviter</button>
  </div>`;
  if (!members.length) return header + `<div class="card-pad" style="text-align:center;color:var(--text-3)">Aucun membre pour le moment.</div>`;
  return header + `<div class="card-pad" style="display:flex;flex-direction:column;gap:2px">
    ${members.map(m=>{
      const canManage = (_myRole === 'owner' || _myRole === 'admin') && m.role !== 'owner' && String(m.id) !== String(_meId);
      return `
      <div class="row" style="padding:10px 0;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="location.href='profile.html?id=${encodeURIComponent(m.id)}'">
          <img class="avatar" src="${m.avatar}" alt="${escapeHtml(m.name)}" style="width:38px;height:38px">
          <div><div class="row-title">${escapeHtml(m.name)}</div><div class="row-sub">${escapeHtml(m.handle||'')}</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="pill ${m.role==='owner'?'pill-accent':'pill-muted'}">${ROLE_LABEL[m.role]||m.role}</span>
          ${canManage ? `<button class="btn btn-ghost btn-sm" onclick="handleRemoveMember('${m.id}')">Retirer</button>` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

/* Issue: api.inviteToWorld() already existed (creates a real
   notification for the invited user) but there was no invite button
   or UI anywhere to trigger it. */
function openInviteModal(){
  openModal(`
    <h3 style="margin:0 0 16px">Inviter dans ${escapeHtml(_world.name)}</h3>
    <div class="field"><label>Rechercher une personne</label><input id="inviteSearchInput" placeholder="Nom ou @handle..." oninput="handleInviteSearchInputDebounced(this.value)"></div>
    <div id="inviteResults" style="max-height:280px;overflow:auto;margin-bottom:6px"></div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Fermer</button>
    </div>`);
}
function handleInviteSearchInputDebounced(q){
  clearTimeout(_inviteSearchTimer);
  _inviteSearchTimer = setTimeout(() => handleInviteSearchInput(q), 300);
}
async function handleInviteSearchInput(q){
  const token = ++_inviteSearchToken;
  const resultsEl = document.getElementById('inviteResults');
  if (!resultsEl) return;
  const query = (q || '').trim();
  if (query.length < 2) { resultsEl.innerHTML = `<div style="color:var(--text-3);font-size:13px;padding:8px 0">Tapez au moins 2 caractères.</div>`; return; }
  resultsEl.innerHTML = `<div style="color:var(--text-3);font-size:13px;padding:8px 0">Recherche...</div>`;
  try {
    const results = await api.search(query);
    if (token !== _inviteSearchToken) return; // a newer keystroke superseded this response
    const memberIds = new Set((_worldMembers||[]).map(m => String(m.id)));
    const profiles = (results.profiles||[]).filter(p => p.id && !memberIds.has(String(p.id)));
    resultsEl.innerHTML = profiles.length ? profiles.map(p=>`
      <div class="row" style="justify-content:space-between;padding:8px 0">
        <div style="display:flex;align-items:center;gap:10px">
          <img class="avatar" src="${p.avatar || ('https://i.pravatar.cc/60?u='+encodeURIComponent(p.handle||p.name||'x'))}" alt="${escapeHtml(p.name||'')}" style="width:32px;height:32px">
          <div><div class="row-title">${escapeHtml(p.name||'Utilisateur')}</div><div class="row-sub">${escapeHtml(p.handle||'')}</div></div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="handleInviteUser('${p.id}', this)">Inviter</button>
      </div>`).join('') : `<div style="color:var(--text-3);font-size:13px;padding:8px 0">Aucun résultat.</div>`;
  } catch (err) {
    if (token !== _inviteSearchToken) return;
    resultsEl.innerHTML = `<div style="color:var(--red);font-size:13px;padding:8px 0">Erreur de recherche.</div>`;
  }
}
async function handleInviteUser(userId, btn){
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await api.inviteToWorld(WORLD_ID, userId);
    btn.textContent = 'Invité ✓';
    btn.classList.remove('btn-outline');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Inviter';
    showError(err);
  }
}
window.openInviteModal = openInviteModal;
window.handleInviteSearchInputDebounced = handleInviteSearchInputDebounced;
window.handleInviteUser = handleInviteUser;
async function handleRemoveMember(userId){
  if (!confirm('Retirer ce membre du monde ?')) return;
  try {
    await api.removeWorldMember(WORLD_ID, userId);
    _worldMembers = _worldMembers.filter(m => String(m.id) !== String(userId));
    const container = document.getElementById('worldTabContent');
    if (container) container.innerHTML = worldMembersTabHTML(_worldMembers);
    showToast('Membre retiré ✓', 'success');
  } catch (err) {
    showError(err);
  }
}
window.handleRemoveMember = handleRemoveMember;

function worldEventsTabHTML(events){
  return `
  <div class="card-pad" style="display:flex;justify-content:flex-end;gap:10px">
    <span class="link" style="font-size:13px;cursor:pointer" onclick="location.href='events.html?world=${encodeURIComponent(WORLD_ID)}'">Voir tout</span>
    <button class="btn btn-primary btn-sm" onclick="location.href='events.html?world=${encodeURIComponent(WORLD_ID)}'">+ Créer un événement</button>
  </div>
  ${events.length ? events.map(e=>`
    <div class="row" style="padding:12px 16px;align-items:flex-start;gap:14px">
      <div class="tile" style="background:var(--accent-soft);color:var(--accent-2);flex-direction:column;font-weight:800;width:44px;height:44px;font-size:12px;line-height:1.1">${escapeHtml(e.day)}<span style="font-size:9px;font-weight:700">${escapeHtml(e.mon)}</span></div>
      <div><div class="row-title">${escapeHtml(e.title)}</div><div class="row-sub">📍 ${escapeHtml(e.place)} · ${escapeHtml(e.going)}</div></div>
    </div>`).join('') : `<div class="card-pad" style="text-align:center;color:var(--text-3)">Aucun événement pour le moment dans ce monde.</div>`}`;
}

function worldResourcesTabHTML(resources){
  return `
  <div class="card-pad" style="display:flex;justify-content:flex-end">
    <button class="btn btn-primary btn-sm" onclick="openAddResourceModal()">+ Ajouter une ressource</button>
  </div>
  ${resources.length ? resources.map(r=>`
    <div class="row" style="padding:10px 16px;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <a href="${r.url}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;color:var(--text-1);text-decoration:none;flex:1;min-width:200px">
        <span style="font-size:18px">${RESOURCE_ICON[r.type]||'🔗'}</span>
        <div><div class="row-title">${escapeHtml(r.title)}</div><div class="row-sub">Ajouté par ${escapeHtml(r.addedBy)}</div></div>
      </a>
      ${(_myRole==='owner'||_myRole==='admin') ? `<button class="btn btn-ghost btn-sm" onclick="handleDeleteResource('${r.id}')">Supprimer</button>` : ''}
    </div>`).join('') : `<div class="card-pad" style="text-align:center;color:var(--text-3)">Aucune ressource pour le moment.</div>`}`;
}
function openAddResourceModal(){
  openModal(`
    <h3 style="margin:0 0 16px">Ajouter une ressource</h3>
    <div class="field"><label>Titre</label><input id="resTitle" placeholder="ex: Guide complet React"></div>
    <div class="field"><label>URL</label><input id="resUrl" placeholder="https://..."></div>
    <div class="field"><label>Type</label><select id="resType"><option value="link">Lien</option><option value="video">Vidéo</option><option value="article">Article</option><option value="doc">Documentation</option></select></div>
    <div id="resErr" class="err-msg" hidden style="background:var(--red-soft);border:1px solid var(--red);color:var(--text-1);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="resSubmit" onclick="submitAddResource()">Ajouter</button>
    </div>`);
}
async function submitAddResource(){
  const title = document.getElementById('resTitle').value.trim();
  const url = document.getElementById('resUrl').value.trim();
  const resourceType = document.getElementById('resType').value;
  const errEl = document.getElementById('resErr');
  if (!title || !url){ errEl.textContent = "Le titre et l'URL sont requis."; errEl.hidden = false; return; }
  if (typeof DB !== 'undefined' && DB.isConnected){
    const session = await DB.getSession();
    if (!session){ window.location.href = 'login.html'; return; }
  }
  const btn = document.getElementById('resSubmit');
  btn.disabled = true; btn.textContent = 'Ajout...';
  try{
    const resource = await api.addWorldResource(WORLD_ID, { title, url, resourceType });
    if (_worldResources === null) _worldResources = [];
    _worldResources.unshift(resource);
    closeModal();
    showToast('Ressource ajoutée ✓', 'success');
    const container = document.getElementById('worldTabContent');
    if (container) container.innerHTML = worldResourcesTabHTML(_worldResources);
  }catch(err){
    errEl.textContent = err.message || "Impossible d'ajouter cette ressource.";
    errEl.hidden = false;
    btn.disabled = false; btn.textContent = 'Ajouter';
  }
}
async function handleDeleteResource(resourceId){
  if (!confirm('Supprimer cette ressource ?')) return;
  try {
    await api.deleteWorldResource(resourceId);
    _worldResources = _worldResources.filter(r => String(r.id) !== String(resourceId));
    const container = document.getElementById('worldTabContent');
    if (container) container.innerHTML = worldResourcesTabHTML(_worldResources);
    showToast('Ressource supprimée ✓', 'success');
  } catch (err) {
    showError(err);
  }
}
window.openAddResourceModal = openAddResourceModal;
window.submitAddResource = submitAddResource;
window.handleDeleteResource = handleDeleteResource;

/* Switch the active world tab and load its content on demand
   (mirrors switchProfileTab in profile.html). Members/events/resources
   are fetched once and cached in module vars, not refetched every click. */
async function switchWorldTab(tabEl, tab){
  document.querySelectorAll('#worldTabs .tab').forEach(t=>t.classList.remove('active'));
  tabEl.classList.add('active');
  const container = document.getElementById('worldTabContent');
  if (!container) return;
  if (tab === 'posts'){
    container.innerHTML = worldPostsTabHTML(_worldPosts);
    wireGlobalInteractions();
    return;
  }
  if (tab === 'members'){
    if (_worldMembers === null){
      container.innerHTML = `<div class="card-pad" style="text-align:center;color:var(--text-3)">Chargement...</div>`;
      try { _worldMembers = await api.getWorldMembers(WORLD_ID); } catch (err) { _worldMembers = []; console.warn('[WorldHub] getWorldMembers failed:', err.message); }
    }
    container.innerHTML = worldMembersTabHTML(_worldMembers);
  } else if (tab === 'events'){
    container.innerHTML = `<div class="card-pad" style="text-align:center;color:var(--text-3)">Chargement...</div>`;
    if (_worldEvents === null){
      try { _worldEvents = await api.getEvents(WORLD_ID); } catch (err) { _worldEvents = []; console.warn('[WorldHub] getEvents failed:', err.message); }
    }
    container.innerHTML = worldEventsTabHTML(_worldEvents);
  } else if (tab === 'resources'){
    if (_worldResources === null){
      container.innerHTML = `<div class="card-pad" style="text-align:center;color:var(--text-3)">Chargement...</div>`;
      try { _worldResources = await api.getWorldResources(WORLD_ID); } catch (err) { _worldResources = []; console.warn('[WorldHub] getWorldResources failed:', err.message); }
    }
    container.innerHTML = worldResourcesTabHTML(_worldResources);
  }
}
window.switchWorldTab = switchWorldTab;

function mainWorld(world){
  return `
  <div class="main-col">
    <div class="world-cover">
      <div class="glyph-lg">${world.icon || '🌍'}</div>
      <div>
        <div style="font-size:24px;font-weight:800">${escapeHtml(world.name)}</div>
        <div style="color:var(--text-2);font-size:13.5px;margin:4px 0 14px">${escapeHtml(String(world.members || 0))} Membres · 🌍 Public</div>
        <p style="color:var(--text-2);font-size:13.5px;max-width:520px;margin:0 0 14px">${escapeHtml(world.description || 'Partagez vos connaissances, posez vos questions et progressez ensemble.')}</p>
        <button class="btn ${_isMember?'btn-outline':'btn-primary'}" onclick="handleJoinWorld(this)">${_isMember?'Rejoint ✓':'Rejoindre'}</button>
      </div>
    </div>
    <div class="card">
      <div class="tabs" id="worldTabs">
        <div class="tab active" data-tabkey="posts" onclick="switchWorldTab(this,'posts')">Publications</div>
        <div class="tab" data-tabkey="members" onclick="switchWorldTab(this,'members')">Membres</div>
        <div class="tab" data-tabkey="events" onclick="switchWorldTab(this,'events')">Événements</div>
        <div class="tab" data-tabkey="resources" onclick="switchWorldTab(this,'resources')">Ressources</div>
      </div>
      <div id="worldTabContent">${worldPostsTabHTML(_worldPosts)}</div>
    </div>
  </div>`;
}

async function render(){
  const [world, posts, isMember] = await Promise.all([
    api.getWorld(WORLD_ID),
    api.getWorldPosts(WORLD_ID),
    api.isWorldMember(WORLD_ID),
  ]);
  _world = world;
  _worldPosts = posts;
  _isMember = isMember;

  const [roleRes, profileRes, membersRes, resourcesRes] = await Promise.allSettled([
    api.getWorldRole(WORLD_ID),
    api.getCurrentProfile(),
    api.getWorldMembers(WORLD_ID),
    api.getWorldResources(WORLD_ID),
  ]);
  _myRole = roleRes.status === 'fulfilled' ? roleRes.value : null;
  _meId = profileRes.status === 'fulfilled' ? (profileRes.value?.id || null) : null;
  _worldMembers = membersRes.status === 'fulfilled' ? membersRes.value : [];
  _worldResources = resourcesRes.status === 'fulfilled' ? resourcesRes.value : [];

  initLayout({ active: WORLD_ID, mainHTML: mainWorld(_world), rail: worldRail(_world, _worldMembers, _worldResources) });
}
render();
</script>
</body>
</html>
