<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Programmation</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/app.js"></script>
<script>
function worldRail(){
  return `
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">À propos</h3>
    <p style="font-size:13.5px;color:var(--text-2);line-height:1.6">Un espace pour les développeurs de tous niveaux. Partagez du code, posez des questions et progressez ensemble.</p>
    <div class="row" style="padding:8px 0"><span>📁</span>&nbsp; Catégorie: Programmation</div>
    <div class="row" style="padding:8px 0"><span>📅</span>&nbsp; Créé le 15 janv. 2024</div>
    <div class="row" style="padding:8px 0"><span>🌐</span>&nbsp; Français</div>
  </div>
  <div class="card">
    <div class="card-head"><h3>Ressources populaires</h3></div>
    <div class="row"><div><div class="row-title">JavaScript Roadmap</div><div class="row-sub">Guide complet</div></div></div>
    <div class="row"><div><div class="row-title">React Documentation officielle</div><div class="row-sub">Référence</div></div></div>
    <div class="row"><div><div class="row-title">Node.js Best Practices</div><div class="row-sub">Guide</div></div></div>
  </div>
  <div class="card">
    <div class="card-head"><h3>Admins</h3></div>
    ${MOCK.topMembers.slice(0,2).map(m=>`
      <div class="row"><img class="avatar" src="${m.avatar}" style="width:34px;height:34px"><div><div class="row-title">${m.name}</div><div class="row-sub">${m.meta.includes('@')?m.meta:'@'+m.name.toLowerCase().replace(' ','.')}</div></div></div>`).join('')}
  </div>`;
}

function mainWorld(){
  return `
  <div class="main-col">
    <div class="world-cover">
      <div class="glyph-lg">💻</div>
      <div>
        <div style="font-size:24px;font-weight:800">Programmation</div>
        <div style="color:var(--text-2);font-size:13.5px;margin:4px 0 14px">12.3k Membres · 🌍 Public</div>
        <p style="color:var(--text-2);font-size:13.5px;max-width:520px;margin:0 0 14px">Partagez vos connaissances, posez vos questions et progressez ensemble dans l’univers du code.</p>
        <button class="btn btn-primary">Rejoindre</button>
      </div>
    </div>
    <div class="card">
      <div class="tabs">
        <div class="tab active">Publications</div>
        <div class="tab">Membres</div>
        <div class="tab">Événements</div>
        <div class="tab">Ressources</div>
      </div>
      <div class="composer">
        <div class="composer-top">
          <img class="avatar" src="${MOCK.user.avatar}" style="width:38px;height:38px">
          <div class="fake-input">Quoi de neuf dans Programmation ?</div>
        </div>
        <div class="composer-actions">
          <div class="chip blue">🖼️ Image</div><div class="chip">🎬 Vidéo</div><div class="chip green">📊 Sondage</div>
          <div class="spacer"></div><button class="btn btn-primary btn-sm">Publier</button>
        </div>
      </div>
      ${MOCK.posts.filter(p=>p.world==='Programmation').map(p=>`
        <div class="post">
          <div class="post-head">
            <img class="avatar" src="https://i.pravatar.cc/80?u=${p.handle}" style="width:40px;height:40px">
            <div><div class="u-name">${p.author}</div><div class="u-meta">${p.time}</div></div>
            <span class="more">⋯</span>
          </div>
          <div class="post-text">${p.text}</div>
          ${p.code?`<div class="code-card">${p.code}</div>`:''}
          <div class="post-stats"><span>❤️ ${p.likes} j’aime</span><span>${p.comments} commentaires</span></div>
        </div>`).join('')}
    </div>
  </div>`;
}
initLayout({ active:'programming', mainHTML: mainWorld(), rail: worldRail() });
</script>
</body>
</html>
