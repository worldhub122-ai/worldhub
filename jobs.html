<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldHub — Offres d’emploi</title>
<link rel="stylesheet" href="assets/css/main.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4171449506245617" crossorigin="anonymous"></script>
</head>
<body>
<div id="topbar-slot"></div>
<div id="shell-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/app.js"></script>
<script>
function jobCard(j){
  return `
  <div class="card card-pad" style="display:flex;gap:14px;align-items:flex-start">
    <div class="tile" style="background:var(--accent-soft);color:var(--accent-2)">🧰</div>
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:700;font-size:15px">${escapeHtml(j.title)}</div>
          <div style="color:var(--text-3);font-size:13px;margin-top:2px">${escapeHtml(j.company)} · ${escapeHtml(j.place)} · ${escapeHtml(j.posted)}</div>
        </div>
        <button class="btn btn-primary btn-sm" data-job-id="${j.id ?? ''}" onclick="handleApply(this)">Postuler</button>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <span class="pill pill-accent">${escapeHtml(j.tag)}</span>
        <span class="pill pill-muted">${escapeHtml(j.type)}</span>
      </div>
    </div>
  </div>`;
}
async function jobsRail(){
  const companies = await api.getCompanies();
  return `
  <div class="card card-pad">
    <h3 style="margin:0 0 12px;font-size:15px">Filtrer</h3>
    <div class="field"><label>Type de contrat</label><select id="filterType"><option>Tous</option><option>CDI</option><option>Freelance</option><option>Stage</option></select></div>
    <div class="field"><label>Lieu</label><select id="filterPlace"><option>Tous</option><option>Remote</option><option>Paris, FR</option><option>Lyon, FR</option></select></div>
    <div class="field"><label>Monde</label><select id="filterWorld"><option>Tous</option>${MOCK.worlds.map(w=>`<option>${w.name}</option>`).join('')}</select></div>
    <button class="btn btn-primary" style="width:100%" onclick="applyJobFilters()">Appliquer</button>
  </div>
  <div class="card">
    <div class="card-head"><h3>Top recruteurs</h3></div>
    ${companies.slice(0,3).map(c=>`<div class="row"><div class="tile" style="background:var(--blue-soft);color:var(--blue)">🏢</div><div><div class="row-title">${escapeHtml(c.name)}</div><div class="row-sub">${c.openJobs} postes ouverts</div></div></div>`).join('')}
  </div>`;
}

/* Apply to a job: requires login, disables the button while sending,
   shows a clear success/error state instead of failing silently. */
async function handleApply(btn){
  const jobId = btn.dataset.jobId;
  if (typeof DB !== 'undefined' && DB.isConnected) {
    const session = await DB.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  }
  btn.disabled = true;
  btn.textContent = 'Envoi...';
  try {
    await api.applyToJob(jobId);
    btn.textContent = 'Candidature envoyée ✓';
  } catch (err) {
    showError(err);
    btn.disabled = false;
    btn.textContent = 'Postuler';
  }
}

let _allJobs = [];

function mainJobs(jobs){
  return `
  <div class="main-col">
    <div class="card card-pad" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div><div style="font-size:19px;font-weight:800">Offres d’emploi</div><div style="color:var(--text-3);font-size:13px" id="jobsCountLabel">${jobs.length} offres disponibles</div></div>
      <button class="btn btn-primary" onclick="openCreateJobModal()">+ Publier une offre</button>
    </div>
    <div id="jobsListContainer">
      ${jobs.length ? jobs.map(jobCard).join('') : `<div class="card card-pad" style="text-align:center;color:var(--text-3)">Aucune offre pour le moment.</div>`}
    </div>
  </div>`;
}

/* Filter the already-loaded job list client-side (Issue: "Appliquer"
   had no onclick and did nothing at all). */
function applyJobFilters(){
  const type  = document.getElementById('filterType').value;
  const place = document.getElementById('filterPlace').value;
  const world = document.getElementById('filterWorld').value;
  const filtered = _allJobs.filter(j => {
    if (type !== 'Tous' && j.type !== type) return false;
    if (place !== 'Tous' && j.place !== place) return false;
    if (world !== 'Tous' && j.tag !== world) return false;
    return true;
  });
  const container = document.getElementById('jobsListContainer');
  const label = document.getElementById('jobsCountLabel');
  if (label) label.textContent = `${filtered.length} offres disponibles`;
  if (container) {
    container.innerHTML = filtered.length
      ? filtered.map(jobCard).join('')
      : `<div class="card card-pad" style="text-align:center;color:var(--text-3)">Aucune offre ne correspond à ces filtres.</div>`;
  }
}

/* Create-job modal (Issue: DB.createJob already existed but nothing
   in app.js/jobs.html exposed a way to call it). */
async function openCreateJobModal(){
  const companies = await api.getCompanies();
  openModal(`
    <h3 style="margin:0 0 16px">Publier une offre d'emploi</h3>
    <div class="field"><label>Entreprise</label>
      <select id="cjCompany">${companies.map(c=>`<option value="${c.id ?? ''}">${escapeHtml(c.name)}</option>`).join('') || '<option value="">Aucune entreprise disponible</option>'}</select>
    </div>
    <div class="field"><label>Titre du poste</label><input id="cjTitle" placeholder="ex: Développeur Frontend React"></div>
    <div class="field"><label>Description</label><textarea id="cjDesc" rows="3" placeholder="Décrivez le poste"></textarea></div>
    <div class="field"><label>Lieu</label><input id="cjLocation" placeholder="ex: Paris, FR"></div>
    <div class="field"><label>Type de contrat</label>
      <select id="cjType"><option>CDI</option><option>CDD</option><option>Freelance</option><option>Stage</option><option>Alternance</option></select>
    </div>
    <div class="field"><label>Monde</label><select id="cjWorld"><option value="">Aucun</option>${MOCK.worlds.map(w=>`<option value="${w.id}">${w.name}</option>`).join('')}</select></div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--text-2);margin-bottom:14px"><input type="checkbox" id="cjRemote"> Poste en télétravail (Remote)</label>
    <div id="cjErr" class="err-msg" hidden style="background:var(--red-soft);border:1px solid var(--red);color:var(--text-1);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="cjSubmit" onclick="submitCreateJob()">Publier</button>
    </div>`);
}
async function submitCreateJob(){
  const companyId = document.getElementById('cjCompany').value;
  const title = document.getElementById('cjTitle').value.trim();
  const description = document.getElementById('cjDesc').value.trim();
  const location = document.getElementById('cjLocation').value.trim();
  const jobType = document.getElementById('cjType').value;
  const worldId = document.getElementById('cjWorld').value || null;
  const isRemote = document.getElementById('cjRemote').checked;
  const errEl = document.getElementById('cjErr');
  if (!title || !companyId){ errEl.textContent = 'Le titre et l\'entreprise sont requis.'; errEl.hidden = false; return; }
  if (typeof DB !== 'undefined' && DB.isConnected){
    const session = await DB.getSession();
    if (!session){ window.location.href = 'login.html'; return; }
  }
  const btn = document.getElementById('cjSubmit');
  btn.disabled = true; btn.textContent = 'Publication...';
  try{
    await api.createJob({ companyId, title, description, location, jobType, worldId, isRemote });
    closeModal();
    showToast('Offre publiée ✓', 'success');
    render();
  }catch(err){
    errEl.textContent = err.message || 'Impossible de publier cette offre.';
    errEl.hidden = false;
    btn.disabled = false; btn.textContent = 'Publier';
  }
}

async function render(){
  const [jobs, rail] = await Promise.all([api.getJobs(), jobsRail()]);
  _allJobs = jobs;
  initLayout({ active:'jobs', mainHTML: mainJobs(jobs), rail });
}
render();
</script>
</body>
</html>
